<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 World Cup Guide – Melbourne</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#c9a84c">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #2a3550;
    --gold: #f5a623;
    --gold2: #e8962a;
    --text: #e8eaf0;
    --muted: #7c8aab;
    --accent: #3b82f6;
    --green: #22c55e;
    --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* HEADER */
  #topbar { position: sticky; top: 0; z-index: 100; }
  header {
    background: linear-gradient(135deg, #0a0e1a 0%, #1a2a4a 50%, #0a1628 100%);
    border-bottom: 2px solid var(--gold);
    padding: 16px 24px;
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center;
  }
  .header-title { display: flex; align-items: center; gap: 14px; }
  .trophy { font-size: 32px; }
  h1 { font-size: 22px; font-weight: 800; color: var(--gold); letter-spacing: -0.5px; }
  h1 span { color: var(--text); font-weight: 400; font-size: 14px; display: block; }
  .melbourne-time { text-align: right; width: 160px; flex-shrink: 0; }
  .time-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .time-display { font-size: 17px; font-weight: 500; color: var(--gold); }
  .date-display { font-size: 12px; color: var(--muted); }
  .location-wrapper { position: relative; display: inline-flex; align-items: center; gap: 5px; cursor: pointer; margin-bottom: 4px; }
  .location-icon { flex-shrink: 0; display: block; }
  .location-name { font-size: 12px; color: var(--text); }
  .location-select {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
    -webkit-appearance: none; appearance: none;
  }

  /* NAV TABS */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; gap: 0; backdrop-filter: blur(8px); }
  .tab { padding: 14px 22px; cursor: pointer; font-weight: 600; font-size: 14px; color: var(--muted); border-bottom: 3px solid transparent; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* LAYOUT */
  .app { display: flex; height: calc(100vh - 112px); overflow: hidden; }
  .schedule-panel { width: 420px; min-width: 420px; overflow-y: auto; border-right: 1px solid var(--border); }
  .detail-panel { flex: 1; overflow-y: auto; }

  /* SECTION HEADERS */
  .section-header {
    padding: 16px 20px 10px;
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .section-header h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gold); font-weight: 700; }
  .section-header p { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* DATE GROUP */
  .date-group { margin-bottom: 4px; }
  .date-label {
    padding: 8px 20px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .date-label.today { color: var(--gold); background: rgba(245,166,35,0.08); }
  .today-badge { background: var(--gold); color: #000; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 800; }

  /* MATCH CARD */
  .match-card {
    padding: 14px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
    display: flex; flex-direction: column; gap: 6px;
  }
  .match-card:hover { background: var(--surface2); border-left-color: var(--border); }
  .match-card.selected { background: var(--surface2); border-left-color: var(--gold); }
  .match-card.live { border-left-color: var(--green); }
  .match-meta { display: flex; justify-content: space-between; align-items: center; }
  .match-group { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); font-weight: 700; }
  .match-time { font-size: 11px; color: var(--muted); }
  .match-time.live-time { color: var(--green); font-weight: 700; }
  .match-teams { display: flex; align-items: center; gap: 10px; }
  .team-display { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .team-display.right { flex-direction: row-reverse; }
  .flag { font-size: 22px; flex-shrink: 0; }
  .team-name { font-weight: 700; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .score-display { font-size: 18px; font-weight: 800; color: var(--gold); min-width: 50px; text-align: center; }
  .vs { font-size: 11px; color: var(--muted); min-width: 30px; text-align: center; }
  .match-venue { font-size: 11px; color: var(--muted); }
  .rating { display: flex; gap: 2px; }
  .star { color: var(--gold); font-size: 10px; }
  .star.empty { color: var(--border); }

  /* DETAIL PANEL */
  .detail-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--muted); gap: 16px;
  }
  .detail-empty .icon { font-size: 64px; }
  .detail-empty p { font-size: 14px; }

  .detail-content { padding: 0 0 40px; }

  /* MATCH HERO */
  .match-hero {
    background: linear-gradient(135deg, #0d1928, #1a2a4a, #0d1928);
    padding: 28px 32px;
    border-bottom: 1px solid var(--border);
  }
  .hero-group { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 12px; font-weight: 700; }
  .hero-matchup { display: flex; align-items: center; gap: 20px; margin-bottom: 16px; }
  .hero-team { flex: 1; text-align: center; }
  .hero-flag { font-size: 56px; display: block; margin-bottom: 8px; }
  .hero-name { font-size: 20px; font-weight: 800; }
  .hero-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .hero-vs { font-size: 14px; color: var(--muted); font-weight: 600; min-width: 60px; text-align: center; }
  .hero-score { font-size: 40px; font-weight: 900; color: var(--gold); }
  .hero-scorers { display: flex; justify-content: space-between; margin-top: 6px; margin-bottom: 4px; gap: 8px; }
  .hero-scorers-home { text-align: left; font-size: 11px; color: var(--muted); line-height: 1.85; flex: 1; }
  .hero-scorers-away { text-align: right; font-size: 11px; color: var(--muted); line-height: 1.85; flex: 1; }
  .hero-info { display: flex; gap: 20px; flex-wrap: wrap; }
  .hero-info-item { font-size: 12px; color: var(--muted); }
  .hero-info-item strong { color: var(--text); }
  .hero-status { display: inline-flex; align-items: center; gap: 6px; background: rgba(245,166,35,0.15); border: 1px solid var(--gold); border-radius: 20px; padding: 4px 12px; margin-bottom: 12px; font-size: 12px; color: var(--gold); font-weight: 700; }
  .live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* SECTIONS */
  .section { padding: 24px 32px; border-bottom: 1px solid var(--border); }
  .section h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gold); font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .section h3 span { font-size: 16px; }

  /* PREDICTION BAR */
  .prediction { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .pred-label { font-size: 12px; color: var(--muted); width: 80px; }
  .pred-bar-wrap { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; display: flex; }
  .pred-bar-home { height: 100%; background: var(--accent); transition: width 0.5s; }
  .pred-bar-draw { height: 100%; background: var(--muted); }
  .pred-bar-away { height: 100%; background: var(--gold); }
  .pred-pct { font-size: 12px; font-weight: 700; width: 36px; text-align: right; }
  .home-pct { color: var(--accent); }
  .away-pct { color: var(--gold); }
  .draw-pct { color: var(--muted); }

  /* TEAM COMPARISON */
  .team-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .team-col { }
  .team-col-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
  .team-col-header .flag { font-size: 24px; }
  .team-col-header h4 { font-size: 15px; font-weight: 800; }

  /* PLAYER CARD */
  .player-card { background: var(--surface); border-radius: 8px; padding: 12px; margin-bottom: 8px; border: 1px solid var(--border); }
  .player-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .player-role { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .player-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }

  /* TACTICS */
  .tactic-item { background: var(--surface); border-radius: 8px; padding: 14px; margin-bottom: 10px; border-left: 3px solid var(--accent); }
  .tactic-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); font-weight: 700; margin-bottom: 4px; }
  .tactic-text { font-size: 13px; line-height: 1.6; }

  /* TALKING POINTS */
  .talking-points { display: flex; flex-direction: column; gap: 10px; }
  .tp { display: flex; gap: 12px; align-items: flex-start; background: var(--surface); border-radius: 8px; padding: 12px; }
  .tp-icon { font-size: 18px; flex-shrink: 0; }
  .tp-text { font-size: 13px; line-height: 1.6; }

  /* STAKES */
  .stakes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stakes-card { background: var(--surface); border-radius: 8px; padding: 14px; }
  .stakes-flag { font-size: 28px; margin-bottom: 6px; }
  .stakes-team { font-size: 12px; font-weight: 700; color: var(--gold); margin-bottom: 6px; }
  .stakes-text { font-size: 12px; color: var(--muted); line-height: 1.5; }

  /* FORMATION */
  .formation-label { font-size: 28px; font-weight: 900; color: var(--gold); }
  .formation-sub { font-size: 12px; color: var(--muted); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* GROUPS VIEW */
  .groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; padding: 20px; }
  .group-card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
  .group-title { background: var(--surface2); padding: 10px 14px; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); }
  .group-team { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-top: 1px solid var(--border); cursor: pointer; }
  .group-team:hover { background: var(--surface2); }
  .group-team .flag { font-size: 18px; }
  .group-team-name { font-size: 13px; font-weight: 600; flex: 1; }
  .group-team-rank { font-size: 11px; color: var(--muted); }
  .group-qualifying { border-left: 3px solid var(--accent); }
  .group-team, .group-header-row { display: flex; align-items: center; gap: 8px; padding: 8px 14px; }
  .group-header-row { padding: 3px 14px; border-top: 1px solid var(--border); }
  .group-flag-spacer { width: 18px; flex-shrink: 0; }
  .group-header-spacer { flex: 1; }
  .group-stat-col { width: 20px; text-align: center; flex-shrink: 0; font-size: 11px; color: var(--muted); }
  .group-pts-col { width: 26px; text-align: center; flex-shrink: 0; font-size: 14px; font-weight: 800; color: var(--gold); }
  .group-gd-col { width: 28px; text-align: right; flex-shrink: 0; font-size: 11px; color: var(--muted); }
  .group-header-row .group-stat-col,
  .group-header-row .group-pts-col,
  .group-header-row .group-gd-col { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 600; }

  /* KNOCKOUT BRACKET */
  .bk-outer { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .bk-round-hdr { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); font-weight: 700; text-align: center; padding: 0 2px 6px; height: 24px; display: flex; align-items: flex-end; justify-content: center; white-space: nowrap; }
  .bk-card { background: var(--surface); border: 1px solid var(--border); border-radius: 7px; overflow: hidden; width: 130px; flex-shrink: 0; }
  .bk-card:not(.bk-tbd) { cursor: pointer; transition: border-color 0.15s; }
  .bk-card:not(.bk-tbd):hover { border-color: var(--gold); }
  .bk-card.live-m { border-color: var(--green); }
  .bk-tbd { opacity: 0.28; }
  .bk-card-date { font-size: 8px; color: var(--muted); text-align: center; padding: 2px 4px; background: var(--surface2); border-bottom: 1px solid var(--border); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bk-row { display: flex; align-items: center; gap: 4px; padding: 4px 6px; }
  .bk-row + .bk-row { border-top: 1px solid var(--border); }
  .bk-row.won { color: var(--gold); font-weight: 700; }
  .bk-fl { font-size: 13px; flex-shrink: 0; }
  .bk-nm { flex: 1; font-size: 10px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bk-sc { font-size: 11px; font-weight: 800; color: var(--gold); min-width: 12px; text-align: right; }

  .hidden { display: none !important; }

  /* LANGUAGE TOGGLE */
  .lang-toggle {
    display: inline-flex; border: 1px solid var(--border); border-radius: 20px; overflow: hidden;
  }
  .lang-btn {
    padding: 5px 13px; border: none; background: transparent; color: var(--muted);
    cursor: pointer; font-size: 12px; font-weight: 700; transition: all 0.2s; font-family: inherit;
  }
  .lang-btn:first-child { border-right: 1px solid var(--border); }
  .lang-btn.active { background: var(--gold); color: #000; }
  .lang-btn:hover:not(.active) { color: var(--gold); }

  @media (max-width: 768px) {
    .app { flex-direction: column; height: auto; }
    .schedule-panel { width: 100%; min-width: 0; border-right: none; border-bottom: none; }
    .detail-panel { display: none !important; }
    .detail-empty { display: none !important; }
  }

  /* Mobile drawer */
  .drawer-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
  }
  .drawer-overlay.open { display: block; }
  .drawer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 85vh;
    background: var(--bg);
    border-radius: 16px 16px 0 0;
    border-top: 1px solid var(--border);
    z-index: 101;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    padding-bottom: env(safe-area-inset-bottom, 16px);
  }
  .drawer.open { transform: translateY(0); }
  .drawer-handle {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 16px 0;
    position: sticky; top: 0;
    background: var(--bg);
    z-index: 1;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
    margin-bottom: 4px;
  }
  .drawer-close {
    background: var(--surface); border: none; color: var(--text);
    width: 28px; height: 28px; border-radius: 50%;
    font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div id="topbar">
<header>
  <div class="header-title">
    <span class="trophy">🏆</span>
    <div>
      <h1>2026 World Cup Guide</h1>
    </div>
  </div>
  <div class="lang-toggle">
    <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" data-lang="zh" onclick="setLang('zh')">中文</button>
  </div>
  <div style="display:flex;justify-content:flex-end">
    <div class="melbourne-time">
      <div class="location-wrapper">
        <svg class="location-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 1 8 8c0 5.25-8 14-8 14S4 15.25 4 10a8 8 0 0 1 8-8z"/>
        </svg>
        <span class="location-name" id="locationName">Melbourne / Sydney</span>
        <select class="location-select" id="locationSelect" onchange="setLocation(this.value)">
          <option value="Australia/Sydney">🇦🇺 Melbourne / Sydney</option>
          <option value="Australia/Brisbane">🇦🇺 Brisbane</option>
          <option value="Australia/Adelaide">🇦🇺 Adelaide</option>
          <option value="Australia/Darwin">🇦🇺 Darwin</option>
          <option value="Australia/Perth">🇦🇺 Perth</option>
          <option value="Asia/Shanghai">🇨🇳 Beijing / Shanghai</option>
        </select>
      </div>
      <div class="time-display" id="clock">--:--</div>
      <div class="date-display" id="datedisp">--</div>
    </div>
  </div>
</header>
  <nav>
    <div class="tab active" id="tab-today" onclick="switchTab('today')">⚡ Today</div>
    <div class="tab" id="tab-schedule" onclick="switchTab('schedule')">📅 Schedule</div>
    <div class="tab" id="tab-groups" onclick="switchTab('groups')"><span id="tab-groups-label">⚽ Round of 32</span></div>
  </nav>
</div>

<div class="app">
  <!-- LEFT: SCHEDULE LIST -->
  <div class="schedule-panel" id="schedulePanel">
    <div id="matchList"></div>
  </div>

  <!-- RIGHT: DETAIL PANEL (desktop) -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-empty" id="detailEmpty">
      <span class="icon">⚽</span>
      <p>Select a match to see players, tactics & what to watch</p>
    </div>
    <div class="detail-content hidden" id="detailContent"></div>
  </div>
</div>

<!-- MOBILE DRAWER -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle">
    <span style="font-size:14px;font-weight:700;color:var(--text)" id="drawerTitle"></span>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div id="drawerContent"></div>
</div>

<script>
// ══════════════════════════════════════
//  TEAM DATA
// ══════════════════════════════════════
const TEAMS = {
  MEX: { name: "Mexico", flag: "🇲🇽", group: "A", rank: 15, manager: "Javier Aguirre",
    formation: "4-3-3",
    style: "Counter-attacking with compact defensive shape. Quick vertical transitions through the midfield, with wingers hugging the touchline to create overloads. Relies on home-crowd energy.",
    tactics:"Mexico attack through Lozano on the right — his dribbling draws defenders and creates pockets for Gimenez runs in behind. Edson Alvarez shields the back four and recycles possession, enabling wide players to combine with overlapping fullbacks. Defensively they drop into a compact block and look to win the ball high up the pitch. On home soil set pieces from wide areas are a genuine scoring threat.",
    players: [
      { name: "Santiago Giménez", jersey: "9", role: "Striker", desc: "Clinical centre-forward who left Feyenoord for AC Milan. Pure poacher with intelligent movement in the box — Mexico's best finisher in a generation." },
      { name: "Hirving 'Chucky' Lozano", jersey: "22", role: "Right Winger", desc: "Electric pace and trickery. At his best he drags defenders out of position and creates space for runners. Can win a game on his own in 10 minutes." },
      { name: "Guillermo Ochoa", jersey: "13", role: "Goalkeeper", desc: "The legendary 40-year-old keeper. His reflexes and experience make him a difference-maker — has saved Mexico at multiple World Cups." }
    ],
    narrative: "The host nation curse — Mexico hasn't made a World Cup quarter-final since 1986. Playing on home soil at the iconic Estadio Azteca, the pressure and passion will be immense.",
    stakes: "Playing at Azteca where the Hand of God happened. The nation demands more than a Round of 32 exit. This is their best shot in 40 years." },

  RSA: { name: "South Africa", flag: "🇿🇦", group: "A", rank: 71,
    formation: "4-4-2",
    style: "Organized and hard-working. Compact defensive block with fast breaks. Not there to make up numbers — proved it by qualifying from Africa's toughest group.",
    tactics:"South Africa build through a deep-lying playmaker who distributes quickly to the wide men, targeting transitions before opponents can set their shape. Percy Tau operates in pockets between the lines, linking midfield and attack. Defensively they sit in a tight 4-4-2 mid-block, funnelling play wide and relying on physicality to win second balls. They are dangerous at set pieces, with aerial threats from both centre-backs joining the attack.",
    players: [
      { name: "Percy Tau", jersey: "10", role: "Forward", desc: "Al Ahly's creative spark. Comfortable on either wing, combines dribbling with intelligent link-up play." },
      { name: "Ronwen Williams", jersey: "1", role: "Goalkeeper", desc: "One of Africa's best shot-stoppers. His reflexes kept South Africa alive during qualification." }
    ],
    narrative: "2010 hosts are back! South Africa hosted the tournament 16 years ago. A nostalgic return, now they want to prove they belong.",
    stakes: "Historic comeback story — no team has been as emotionally significant to host a tournament and now qualify on merit." },

  KOR: { name: "South Korea", flag: "🇰🇷", group: "A", rank: 24,
    formation: "4-2-3-1",
    style: "Disciplined and well-organized. Hard-pressing when needed, quick transitions with technically gifted attackers.",
    tactics:"South Korea system is Son-centric: the wide players and fullbacks isolate him in 1v1s where his left foot is devastating. Lee Jae-sung operates as the engine — pressing relentlessly, winning possession and distributing quickly to Son or the overlapping right back. Defensively they sit in a 4-2-3-1 mid-block that transitions instantly to a high press when the ball goes back to the goalkeeper. Their biggest risk is the space Son vacates when pressing — a disciplined right back is essential.",
    players: [

  CZE: { name: "Czech Republic", flag: "🇨🇿", group: "A", rank: 37,

  CAN: { name: "Canada", flag: "🇨🇦", group: "B", rank: 27, manager: "Jesse Marsch",
    formation: "4-3-3",

    tactics:"Canada attacks with Davies cutting inside from the left while David presses centre-backs and Buchanan pins the opposing fullback wide. Jonathan David drops between the lines, plays the one-two and arrives late into the box. Defensively Canada are aggressive and intense in their press — they force mistakes in the opponent half then counter directly with pace.",

  BIH: { name: "Bosnia & Herzegovina", flag: "🇧🇦", group: "B", rank: 50,

  BRA: { name: "Brazil", flag: "🇧🇷", group: "C", rank: 5, manager: "Carlo Ancelotti",

  MAR: { name: "Morocco", flag: "🇲🇦", group: "C", rank: 11, manager: "Walid Regragui",

  HTI: { name: "Haiti", flag: "🇭🇹", group: "C", rank: 84,

  USA: { name: "United States", flag: "🇺🇸", group: "D", rank: 14, manager: "Mauricio Pochettino",
    formation: "4-3-3",

  PRY: { name: "Paraguay", flag: "🇵🇾", group: "D", rank: 39,

  GER: { name: "Germany", flag: "🇩🇪", group: "E", rank: 12, manager: "Julian Nagelsmann",

    style: "Rebuilt under Nagelsmann — more attacking, more creative, less mechanical than the old Germany. High pressing with technical quality through the spine of the team.",
    tactics:"Germany 4-2-3-1 is built on relentless pressing orchestrated by Musiala who acts as the trigger from his advanced midfield position. Kimmich pushes extremely high on the right playing almost as a winger, allowing Musiala to drift into central areas. Wirtz is the creative hub — his incisive dribbling and passing in tight spaces is decisive. Transitions from defence to attack are immediate and direct.",

      { name: "Jamal Musiala", jersey: "10", role: "Attacking Mid", desc: "Bayern's graceful technician — silky dribbling in tight spaces, brave on the ball and scores important goals. Alongside Wirtz, Germany have two of the world's most exciting young players." },

  CIV: { name: "Ivory Coast", flag: "🇨🇮", group: "E", rank: 42,

    style: "Physical and direct. Dangerous from set-pieces and powerful athletes throughout the side.",

    style: "Organized, direct, physical. South American fighting spirit with a pragmatic approach.",
    tactics:"Ecuador 4-4-2 is built around Enner Valencia physical dominance — everything goes through him in the air or as a target for runners beyond. Their wide midfielders press fullbacks high and track back into a compact defensive block. Valencia holds the ball up and plays in arriving midfielders, particularly the second striker. Defensively Ecuador are resolute, protecting a compact central block and winning second balls with aggression.",

  NED: { name: "Netherlands", flag: "🇳🇱", group: "F", rank: 7, manager: "Ronald Koeman",
    formation: "4-3-3",
    style: "Total football heritage meets modern pressing. The Dutch play with technical quality, aggressive pressing and fluid attacking movement. The 4-3-3 is in their DNA.",
    tactics:"The Netherlands 4-3-3 uses Gakpo cutting inside constantly, creating fluid combinations with the striker and the 10. The double pivot releases Van Dijk to step into midfield to create numerical superiority in build-up. Dumfries on the right provides width and crosses that create the majority of chances. Their biggest weakness is the space behind Van Dijk when he steps out — opponents with pace in behind are their greatest challenge.",
    players: [

  JPN: { name: "Japan", flag: "🇯🇵", group: "F", rank: 18,
    formation: "4-2-3-1",
    style: "Technical, disciplined and incredibly well-drilled. Japan's collective intelligence is unmatched in Asia — they press in coordinated waves and are technically superb.",

  ESP: { name: "Spain", flag: "🇪🇸", group: "H", rank: 1, manager: "Luis de la Fuente",
    formation: "4-3-3",
    style: "Positional play mastery — the most technically accomplished team in the tournament. Short passing, intelligent movement, high press. Euro 2024 champions and clear tournament favourites.",
    tactics:"Spain 4-3-3 is the most sophisticated positional play system in world football — Pedri and Gavi combine as the two interior midfielders, creating numerical superiority in central areas through constant movement and one-touch combinations. Yamal dribbling from the right provides a direct threat while Rodri controls the pace from deep. Defensively Spain press as a unit of ten — they recover the ball in the opponent half within seconds. Their pressing trigger is the long ball: when opponents play long, Spain immediately press the second ball.",
    players: [

// ── Location / Timezone ──────────────────────────────
const LOCATION_LABELS = {
  'Australia/Sydney':    'AEST',
  'Australia/Brisbane':  'AEST',
  'Australia/Adelaide':  'ACST',
  'Australia/Darwin':    'ACST',
  'Australia/Perth':     'AWST',
  'Asia/Shanghai':       'CST',
  'Asia/Hong_Kong':      'HKT',
};
let currentTZ = 'Australia/Sydney';


function setLocation(tz) {
  currentTZ = tz;
  // compute UTC offset correctly by comparing tz-local vs UTC locale strings
  const d = new Date();
  const totalMin = Math.round(
    (new Date(d.toLocaleString('en-US', {timeZone: tz})) -
     new Date(d.toLocaleString('en-US', {timeZone: 'UTC'}))) / 60000
  );
  const h = Math.floor(Math.abs(totalMin) / 60);
  const m = Math.abs(totalMin) % 60;
  const sign = totalMin >= 0 ? '+' : '-';
  const offsetStr = m ? `UTC${sign}${h}:${String(m).padStart(2,'0')}` : `UTC${sign}${h}`;

  const sel = document.getElementById('locationSelect');
  const nameEl = document.getElementById('locationName');
  if (sel && nameEl) nameEl.textContent = sel.options[sel.selectedIndex].text.replace(/^\S+\s/, '');
  renderSchedulePanel();
  if (selectedMatchId) selectMatch(selectedMatchId);
  updateClock();
}

function toLocalTZ(utcStr) {
  // returns a Date shifted so that UTC methods give local-time values
  const d = new Date(utcStr);
  const localStr = d.toLocaleString('en-US', { timeZone: currentTZ });
  return new Date(localStr);
}

function formatAESTDate(utcStr) {
  return new Date(utcStr).toLocaleDateString('en-AU', {
    weekday:'short', day:'numeric', month:'short', timeZone: currentTZ
  });
}

function formatAESTTime(utcStr) {
  return new Date(utcStr).toLocaleTimeString('en-AU', {
    hour:'2-digit', minute:'2-digit', hour12:true, timeZone: currentTZ
  });
}

function isToday(utcStr) {
  const todayLocal = new Date().toLocaleDateString('en-AU', { timeZone: currentTZ });
  const matchLocal = new Date(utcStr).toLocaleDateString('en-AU', { timeZone: currentTZ });
  return todayLocal === matchLocal;
}

function isLive(utcStr, matchId) {
  if (matchId !== undefined && MATCHES.find(m => m.id === matchId)?.isLive) return true;
  const now = new Date();
  const matchTime = new Date(utcStr);
  const diff = (now - matchTime) / 60000;
  return diff >= 0 && diff <= 105;
}

function isPast(utcStr, matchId) {
  if (matchId !== undefined) {
    const m = MATCHES.find(x => x.id === matchId);
    if (m?.isFinal) return true;
    if (m?.isLive) return false;
  }
  return new Date() > new Date(new Date(utcStr).getTime() + 105*60000);
}

function stars(n) {
  return '★'.repeat(n) + '☆'.repeat(5-n);
}

function renderSchedulePanel() {
  const list = document.getElementById('matchList');
  list.innerHTML = '';

  if (activeTab === 'groups') {
    const hasKnockout = MATCHES.some(m => m.round);
    if (hasKnockout) {
      renderBracketView(list);
    } else {
      renderGroupsView(list);
    }
    return;
  }

  let matches = [...MATCHES];
  if (activeTab === 'today') {
    matches = matches.filter(m => isToday(m.utc));
  }

  // Group by date
  const byDate = {};
  matches.forEach(m => {
    const dateKey = formatAESTDate(m.utc);
    if (!byDate[dateKey]) byDate[dateKey] = [];
    byDate[dateKey].push(m);
  });

  const todayStr = formatAESTDate(new Date().toISOString());

  if (activeTab === 'today' && matches.length === 0) {
    list.innerHTML = `<div style="padding:40px 20px;text-align:center;color:var(--muted)"><div style="font-size:40px;margin-bottom:12px">📺</div><p style="font-size:14px">${u('noMatches')}</p><p style="font-size:12px;margin-top:8px">${u('noMatchesSub')}</p></div>`;
    return;
  }

  const hdr = document.createElement('div');
  hdr.className = 'section-header';
  hdr.innerHTML = activeTab === 'today'
    ? `<h2>${u('todayHdr')}</h2><p>${u('todaySub')}</p>`
    : `<h2>${u('schedHdr')}</h2><p>${u('schedSub')}</p>`;
  list.appendChild(hdr);

  Object.entries(byDate).sort((a,b) => new Date(a[1][0].utc) - new Date(b[1][0].utc)).forEach(([dateKey, dayMatches]) => {
    dayMatches.sort((a,b) => new Date(a.utc) - new Date(b.utc));
    const isT = dateKey === todayStr;
    const dg = document.createElement('div');
    dg.className = 'date-group';
    if (isT) dg.id = 'today-section';

    const dl = document.createElement('div');
    dl.className = 'date-label' + (isT ? ' today' : '');
    dl.innerHTML = `<span>${dateKey}${isT ? ' – ' + u('today') : ''}</span>`;
    dg.appendChild(dl);

    dayMatches.forEach(m => {
      const t1 = getTeam(m.home);
      const t2 = getTeam(m.away);
      if (!t1 || !t2) return;
      const live = isLive(m.utc, m.id);
      const past = isPast(m.utc, m.id);
      const card = document.createElement('div');
      card.className = 'match-card' + (live ? ' live' : '') + (selectedMatchId === m.id ? ' selected' : '');
      card.onclick = () => selectMatch(m.id);

      const scoreStr = m.score ? `${m.score[0]}–${m.score[1]}` : '';
      const liveMin = live && m.liveMinute ? m.liveMinute : '';
      const timeStr = live
        ? `<span style="display:inline-flex;align-items:center;gap:5px;background:rgba(245,166,35,0.15);border:1px solid var(--gold);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;color:var(--gold)"><span style="width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;flex-shrink:0"></span>LIVE${liveMin ? ' · ' + liveMin : ''}</span>`
        : m.isFinal && m.score
          ? `<span style="font-size:11px;color:var(--muted);font-weight:500">${m.finalTime || 'FT'}</span>`
          : formatAESTTime(m.utc);

      card.innerHTML = `
        <div class="match-meta">
          <span class="match-group">${m.round ? getRoundLabel(m.round) : u('group')+' '+m.group+' · '+u('mdPre')+m.md+u('mdPost')}</span>
          <span class="match-time">${timeStr}</span>
        </div>
        <div class="match-teams">
          <div class="team-display">
            <span class="flag">${t1.flag}</span>
            <span class="team-name">${t1.name}</span>
          </div>
          ${m.score ? `<span class="score-display">${m.score[0]}–${m.score[1]}</span>` : `<span class="vs">vs</span>`}
          <div class="team-display right">
            <span class="team-name">${t2.name}</span>
            <span class="flag">${t2.flag}</span>
          </div>
        </div>
        `;
      dg.appendChild(card);
    });

    list.appendChild(dg);
  });
}

function renderGroupsView(container) {
  const panel = document.createElement('div');
  panel.className = 'groups-grid';
  Object.entries(GROUP_TEAMS).forEach(([grp, codes]) => {
    // Sort by standings if available: pts → gd → gf
    const hasStandings = codes.some(c => STANDINGS[c]);
    const sorted = hasStandings
      ? [...codes].sort((a, b) => {
          const sa = STANDINGS[a] || { pts:-1, gd:-99, gf:-99 };
          const sb = STANDINGS[b] || { pts:-1, gd:-99, gf:-99 };
          if (sb.pts !== sa.pts) return sb.pts - sa.pts;
          if (sb.gd !== sa.gd) return sb.gd - sa.gd;
          return (sb.gf || 0) - (sa.gf || 0);
        })
      : codes;

    const gc = document.createElement('div');
    gc.className = 'group-card';
    // Column headers when standings exist
    const hdr = hasStandings
      ? `<div class="group-header-row"><span class="group-flag-spacer"></span><span class="group-header-spacer"></span><span class="group-stat-col">W</span><span class="group-stat-col">D</span><span class="group-stat-col">L</span><span class="group-pts-col">Pts</span><span class="group-gd-col">GD</span></div>`
      : '';
    gc.innerHTML = `<div class="group-title">Group ${grp}</div>${hdr}`;

    sorted.forEach((code, idx) => {
      const t = getTeam(code);
      const s = STANDINGS[code];
      const qualClass = hasStandings && idx < 2 ? ' group-qualifying' : '';
      if (!t) {
        gc.innerHTML += `<div class="group-team${qualClass}"><span class="flag">🏳️</span><span class="group-team-name">${code}</span></div>`;
        return;
      }
      const gdStr = s ? (s.gd > 0 ? '+' + s.gd : String(s.gd)) : '';
      const rightCol = s
        ? `<span class="group-stat-col">${s.w}</span><span class="group-stat-col">${s.d}</span><span class="group-stat-col">${s.l}</span><span class="group-pts-col">${s.pts}</span><span class="group-gd-col">${gdStr}</span>`
        : `<span class="group-team-rank">${t.rank ? '#'+t.rank : ''}</span>`;
      gc.innerHTML += `<div class="group-team${qualClass}" onclick="viewTeam('${code}')">
        <span class="flag">${t.flag}</span>
        <span class="group-team-name">${t.name}</span>
        ${rightCol}
      </div>`;
    });
    panel.appendChild(gc);
  });
  container.appendChild(panel);
}

function getCurrentRoundName() {

  const done = r32.every(m => m.isFinal);

}

function bkMatchCard(m) {
  const TBD = `<div class="bk-card bk-tbd"><div class="bk-row"><span class="bk-nm">TBD</span></div><div class="bk-row"><span class="bk-nm">TBD</span></div></div>`;
  if (!m) return TBD;
  const t1 = getTeam(m.home), t2 = getTeam(m.away);
  if (!t1 || !t2) return TBD;
  const live = m.isLive;
  const sc = m.score;
  const w = sc && m.isFinal ? (sc[0] > sc[1] ? 0 : sc[0] < sc[1] ? 1 : -1) : -1;
  const dateStr = formatAESTDate(m.utc) + ' ' + formatAESTTime(m.utc);
  const label = live
    ? `<span style="color:var(--green);font-weight:700">LIVE${m.liveMinute?' '+m.liveMinute:''}</span>`
    : sc && m.isFinal ? `FT · ${sc[0]}–${sc[1]}` : dateStr;
  return `<div class="bk-card${live?' live-m':''}" onclick="bkMatchClick(${m.id})">
    <div class="bk-card-date">${label}</div>
    <div class="bk-row${w===0?' won':''}"><span class="bk-fl">${t1.flag}</span><span class="bk-nm">${t1.name}</span>${sc?`<span class="bk-sc">${sc[0]}</span>`:''}</div>
    <div class="bk-row${w===1?' won':''}"><span class="bk-fl">${t2.flag}</span><span class="bk-nm">${t2.name}</span>${sc?`<span class="bk-sc">${sc[1]}</span>`:''}</div>
  </div>`;
}

function bkConn(pairs, slotH, dir) {
  const W = 18, mid = 10, H = pairs * 2 * slotH;
  let p = '';
  for (let i = 0; i < pairs; i++) {
    const y1 = i*2*slotH + slotH/2;
    const y2 = i*2*slotH + slotH*1.5;
    const ym = (y1+y2)/2;
    if (dir === 'r') {
      p += `<line x1="0" y1="${y1}" x2="${mid}" y2="${y1}"/><line x1="${mid}" y1="${y1}" x2="${mid}" y2="${y2}"/><line x1="0" y1="${y2}" x2="${mid}" y2="${y2}"/><line x1="${mid}" y1="${ym}" x2="${W}" y2="${ym}"/>`;
    } else {
      p += `<line x1="${W}" y1="${y1}" x2="${W-mid}" y2="${y1}"/><line x1="${W-mid}" y1="${y1}" x2="${W-mid}" y2="${y2}"/><line x1="${W}" y1="${y2}" x2="${W-mid}" y2="${y2}"/><line x1="${W-mid}" y1="${ym}" x2="0" y2="${ym}"/>`;
    }
  }
  return `<div style="flex-shrink:0"><div style="height:24px"></div><svg width="${W}" height="${H}" style="display:block" xmlns="http://www.w3.org/2000/svg"><g stroke="#2a3550" stroke-width="1.5" fill="none">${p}</g></svg></div>`;
}

function bkRoundCol(matches, label, slotH) {
  const TBD = `<div class="bk-card bk-tbd"><div class="bk-row"><span class="bk-nm">TBD</span></div><div class="bk-row"><span class="bk-nm">TBD</span></div></div>`;
  const slots = matches.map(m =>
    `<div style="height:${slotH}px;display:flex;align-items:center;justify-content:center;padding:2px 3px">${m ? bkMatchCard(m) : TBD}</div>`
  ).join('');
  return `<div style="display:flex;flex-direction:column;flex-shrink:0"><div class="bk-round-hdr">${label}</div>${slots}</div>`;
}

function renderBracketView(container) {
  const SH = 72;
  const tbds = n => Array(n).fill(null);

  const leftHalf = [
    bkRoundCol(left, 'Round of 32', SH),
    bkConn(4, SH, 'r'),
    bkRoundCol(tbds(4), 'Round of 16', SH*2),
    bkConn(2, SH*2, 'r'),
    bkRoundCol(tbds(2), 'Quarter-finals', SH*4),
    bkConn(1, SH*4, 'r'),
    bkRoundCol(tbds(1), 'Semi-finals', SH*8),
  ].join('');

  const rightHalf = [
    bkRoundCol(tbds(1), 'Semi-finals', SH*8),
    bkConn(1, SH*4, 'l'),
    bkRoundCol(tbds(2), 'Quarter-finals', SH*4),
    bkConn(2, SH*2, 'l'),
    bkRoundCol(tbds(4), 'Round of 16', SH*2),
    bkConn(4, SH, 'l'),
    bkRoundCol(right, 'Round of 32', SH),

  const TBD_FINAL = `<div class="bk-card bk-tbd"><div class="bk-row"><span class="bk-nm">TBD</span></div><div class="bk-row"><span class="bk-nm">TBD</span></div></div>`;

  container.innerHTML = `

          ${TBD_FINAL}
        </div>
        <div style="display:flex">${rightHalf}</div>
      </div>
    </div>
  `;
}

function bkMatchClick(id) {

    switchTab('schedule');
    setTimeout(() => selectMatch(id), 50);
  } else {
    selectMatch(id);
  }
}

function selectMatch(id) {
  selectedMatchId = id;
  renderSchedulePanel();

  const m = MATCHES.find(x => x.id === id);
  const t1 = getTeam(m.home);
  const t2 = getTeam(m.away);
  if (!t1 || !t2) return;

  document.getElementById('detailEmpty').classList.add('hidden');
  const dc = document.getElementById('detailContent');
  dc.classList.remove('hidden');
  const isMobile = window.innerWidth <= 768;

  const live = isLive(m.utc, m.id);
  const past = isPast(m.utc, m.id);
  const predKey = `${m.home}-${m.away}`;
  const pred = PREDICTIONS[predKey] || [33, 33, 34];

  const matchStatusInline = live
    ? `<span style="display:inline-flex;align-items:center;gap:5px;background:rgba(245,166,35,0.15);border:1px solid var(--gold);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;color:var(--gold)"><span style="width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;flex-shrink:0"></span>LIVE${m.liveMinute ? ' · ' + m.liveMinute : ''}</span>`
    : past && m.score
    ? `<span style="font-size:11px;color:var(--muted);font-weight:500">${m.finalTime || 'FT'}</span>`
    : `<span style="font-size:11px;color:var(--accent)">${formatAESTDate(m.utc)} · ${formatAESTTime(m.utc)} ${u('aest')}</span>`;

  const scoreHTML = m.score
    ? `<div style="text-align:center"><span class="hero-score">${m.score[0]}–${m.score[1]}</span></div>`
    : `<span class="hero-vs">vs</span>`;

  const scorersHTML = (() => {
    if (!m.score || !m.goals || !m.goals.length) return '';
    const homeGoals = m.goals.filter(g => g.side === 'home');
    const awayGoals = m.goals.filter(g => g.side === 'away');
    if (!homeGoals.length && !awayGoals.length) return '';
    const group = goals => {
      const map = new Map();
      goals.forEach(g => {
        const key = g.name + (g.isOG ? '_og' : '');
        if (!map.has(key)) map.set(key, { name: g.name, minutes: [], isOG: g.isOG });
        map.get(key).minutes.push(g.minute);
      });
      return [...map.values()];
    };
    const fmt = g => `${g.name}${g.isOG ? ' <span style="opacity:0.6">(og)</span>' : ''} <span style="opacity:0.55">${g.minutes.join(', ')}</span>`;
    return `<div class="hero-scorers">
      <div class="hero-scorers-home">${group(homeGoals).map(fmt).join('<br>')}</div>
      <div class="hero-scorers-away">${group(awayGoals).map(fmt).join('<br>')}</div>
    </div>`;
  })();

  dc.innerHTML = `
    <div class="match-hero">
      <div class="hero-group" style="display:flex;align-items:center;justify-content:space-between">${m.round ? getRoundLabel(m.round) : u('group')+' '+m.group+' · '+u('mdPre')+m.md+u('mdPost')}<span>${matchStatusInline}</span></div>
      <div class="hero-matchup">
        <div class="hero-team">
          <span class="hero-flag">${t1.flag}</span>
          <div class="hero-name">${t1.name}</div>
          <div class="hero-sub">${t1.formation || ''}</div>
        </div>
        ${scoreHTML}
        <div class="hero-team">
          <span class="hero-flag">${t2.flag}</span>
          <div class="hero-name">${t2.name}</div>
          <div class="hero-sub">${t2.formation || ''}</div>
        </div>
      </div>
      ${scorersHTML}
    </div>

    <div class="section">
      <h3><span>📖</span> ${u('preview')}</h3>
      <p style="font-size:14px;line-height:1.7;color:var(--text)">${lang === 'zh' && PREVIEWS_ZH[m.id] ? PREVIEWS_ZH[m.id] : (m.preview || '')}</p>
    </div>

    <div class="section">
      <h3><span>🎯</span> ${u('predict')}</h3>
      <div class="prediction">
        <span class="pred-label" style="color:var(--accent)">${t1.name}</span>
        <div class="pred-bar-wrap"><div class="pred-bar-home" style="width:${pred[0]}%"></div></div>
        <span class="pred-pct home-pct">${pred[0]}%</span>
      </div>
      <div class="prediction">
        <span class="pred-label">${u('draw')}</span>
        <div class="pred-bar-wrap"><div class="pred-bar-draw" style="width:${pred[1]}%"></div></div>
        <span class="pred-pct draw-pct">${pred[1]}%</span>
      </div>
      <div class="prediction">
        <span class="pred-label" style="color:var(--gold)">${t2.name}</span>
        <div class="pred-bar-wrap"><div class="pred-bar-away" style="width:${pred[2]}%"></div></div>
        <span class="pred-pct away-pct">${pred[2]}%</span>
      </div>
    </div>

    <div class="section">
      <h3><span>⭐</span> ${u('stars')}</h3>
      <div class="team-columns">
        <div class="team-col">
          <div class="team-col-header">
            <span class="flag">${t1.flag}</span>
            <h4>${t1.name}</h4>
          </div>
          ${(t1.players || []).map(p => `
            <div class="player-card">
              <div class="player-name">${p.name}${p.jersey ? `<span style="font-weight:400;font-size:13px;color:var(--muted);margin-left:7px">#${p.jersey}</span>` : ''}</div>
              <div class="player-role">${p.role}</div>
              <div class="player-desc">${p.desc}</div>
            </div>`).join('')}
        </div>
        <div class="team-col">
          <div class="team-col-header">
            <span class="flag">${t2.flag}</span>
            <h4>${t2.name}</h4>
          </div>
          ${(t2.players || []).map(p => `
            <div class="player-card">
              <div class="player-name">${p.name}${p.jersey ? `<span style="font-weight:400;font-size:13px;color:var(--muted);margin-left:7px">#${p.jersey}</span>` : ''}</div>
              <div class="player-role">${p.role}</div>
              <div class="player-desc">${p.desc}</div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <div class="section">
      <h3><span>♟️</span> ${u('tactics')}</h3>
      <div class="tactic-item">
        <div class="tactic-label">${t1.flag} ${t1.name} · ${t1.formation || 'N/A'}</div>
        <div class="tactic-text">${t1.tactics || t1.style || 'Tactical information coming soon.'}</div>
      </div>
      <div class="tactic-item" style="border-left-color:var(--gold)">
        <div class="tactic-label" style="color:var(--gold)">${t2.flag} ${t2.name} · ${t2.formation || 'N/A'}</div>
        <div class="tactic-text">${t2.tactics || t2.style || 'Tactical information coming soon.'}</div>
      </div>
    </div>

    <div class="section">
      <h3><span>🎭</span> ${u('stakes')}</h3>
      <div class="stakes-grid">
        <div class="stakes-card">
          <div class="stakes-flag">${t1.flag}</div>
          <div class="stakes-team">${t1.name}</div>
          <div class="stakes-text">${t1.stakes || t1.narrative || ''}</div>
        </div>
        <div class="stakes-card">
          <div class="stakes-flag">${t2.flag}</div>
          <div class="stakes-team">${t2.name}</div>
          <div class="stakes-text">${t2.stakes || t2.narrative || ''}</div>
        </div>
      </div>
    </div>

    <div class="section">
      <h3><span>👁️</span> ${u('watchFor')}</h3>
      <div class="talking-points">
        <div class="tp"><span class="tp-icon">⚡</span><span class="tp-text"><strong>${u('keyDuel')}</strong> ${(t1.players && t1.players[0]) ? t1.players[0].name : t1.name} vs ${(t2.players && t2.players[0]) ? t2.players[0].name : t2.name} ${u('keyDuelSuffix')}</span></div>
        <div class="tp"><span class="tp-icon">♟️</span><span class="tp-text"><strong>${u('tacticalBattle')}</strong> ${lang === 'zh'
          ? `${t1.name}：${t1.style ? t1.style.split('。')[0] + '。' : ''} ${t2.name}：${t2.style ? t2.style.split('。')[0] + '。' : ''}`
          : `${t1.name} want to ${t1.style ? t1.style.split('.')[0].toLowerCase() : 'win'}. ${t2.name} will look to ${t2.style ? t2.style.split('.')[0].toLowerCase() : 'win'}. One style will dominate.`}</span></div>
        <div class="tp"><span class="tp-icon">📖</span><span class="tp-text"><strong>${t1.name} ${u('context')}</strong> ${t1.narrative || ''}</span></div>
        <div class="tp"><span class="tp-icon">📖</span><span class="tp-text"><strong>${t2.name} ${u('context')}</strong> ${t2.narrative || ''}</span></div>
        <div class="tp"><span class="tp-icon">⏱️</span><span class="tp-text"><strong>${u('critical')}</strong> ${u('criticalText')}</span></div>
      </div>
    </div>`;
  dc.scrollTop = 0;
  dc.parentElement.scrollTop = 0;

  if (isMobile) {
    const t1 = getTeam(m.home), t2 = getTeam(m.away);
    document.getElementById('drawerTitle').textContent = `${t1.flag} ${t1.name}  vs  ${t2.flag} ${t2.name}`;
    document.getElementById('drawerContent').innerHTML = dc.innerHTML;
    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  document.getElementById('detailPanel').scrollTop = 0;
}

function viewTeam(code) {
  // Find first match for this team
  const m = MATCHES.find(x => x.home === code || x.away === code);
  if (m) {
    switchTab('schedule');
    setTimeout(() => selectMatch(m.id), 100);
  }
}

    tactics:'摩洛哥以无与伦比的强度在紧凑的4-4-2中位阵型中防守——失球时全员飞奔退回6-2-2阵型。哈基米是发动机：他从右后卫位置的全力冲刺提供宽度，他的传中被空中占优的恩内西里争夺。赢得球权后反击极具破坏力——齐耶赫迅速将球转移到哈基米的套边跑动或左路边锋的单刀局面。阻止哈基米前插是任何对手面临的首要战术难题。',

      {name:'哈基姆·齐耶赫',role:'进攻中场',jersey:'7',desc:'天才型选手——他的左脚是魔法棒，能从无到有制造进球机会。'},
      {name:'索菲安·阿姆拉巴特',role:'中场',jersey:'4',desc:'无休止地破坏对手进攻并带球前进，2022年世界杯一战成名于全球。'}],
    narrative:'第一支进入世界杯四强的非洲球队——2022年连克西班牙、葡萄牙、比利时，震惊全球。他们回来了，要走得更远。',
    stakes:'非洲能否拥有第一支世界杯决赛球队？整个非洲大陆都在注视。' },

  HTI:{ name:'海地',style:'防守谨慎，纪律严明。以工作强度弥补技术差距，韧劲和让比赛变得难看是他们的杀手锏。',
    tactics:'海地摆出防守型5-3-2阵型，吸收压力后通过速度型前锋发动反击。两名前锋协同施压，逼迫对方中卫打出仓皇长传，由此被中场争抢。整体组织和阵型紧凑是最大优势——他们封堵了防线之间的空间，令技术流对手举步维艰。定位球是他们重要的进攻手段。',
    players:[{name:'弗朗兹迪·皮埃罗',role:'前锋',jersey:'9',desc:'身体强健，能在空中和直线冲刺中制造问题。'}],
    narrative:'自1974年后首次参加世界杯！对于这个热爱足球的国家而言，这是巨大的成就。',stakes:'本届最励志的故事，每一分都是奇迹。' },

  SCO:{ name:'苏格兰',
    style:'对抗性强，身体壮硕。有机会就高位逼抢，否则保持防守阵型。定位球是真实威胁。',
    tactics:'苏格兰3-5-2阵型以麦克托米奈为动力引擎，他善于晚插禁区并打进关键球。罗伯逊从左翼卫位置不断套边制造持续的数量优势——他传入禁区的球达到世界级水准。两名前锋协同施压，专门针对在压力下持球不稳的对方中卫。防守端三中卫阵线稳固，但攻击型翼卫身后的空间是苏格兰的软肋。',
    players:[{name:'斯科特·麦克托米奈',role:'中场',jersey:'8',desc:'那不勒斯进球型中场，改变了苏格兰的雄心。预选赛中贡献关键进球，领袖气质十足。'},
      {name:'安迪·罗伯逊',role:'左后卫',jersey:'3',desc:'利物浦传奇左后卫兼队长，助攻和传中均属世界级。'}],
    narrative:'1998年后首次参加世界杯——28年的等待！苏格兰和巴西同组，堪称命运的诗意安排。',
    stakes:'C组有巴西——对苏格兰来说是千载难逢的对阵机会，好好享受。' },

  USA:{ name:'美国',style:'运动能力强，逼抢积极，在博切蒂诺麾下愈加技术化。快速纵向传球配合危险定位球。',
    tactics:'博切蒂诺麾下的美国队从前场发起凶猛逼抢——普利西奇担任箭头，在高位制造对手失误。泰勒·亚当斯是防守支点：出色的位置感和预判能力让后卫得以大胆前插为美国提供宽度。乔·雷纳在中场线之间的半空间活动，背身接球后凭借技术质量创造机会。普利西奇从左路内切，是美国最具威胁的远射手。防守端以4-5-1中位阵型为基础，一旦失球立即转换为高位压迫。反击被打乱阵型时宽边区域是最大软肋。',
    players:[{name:'克里斯蒂安·普利西奇',role:'队长/进攻中场',jersey:'10',desc:'AC米兰的美国英雄，第一位真正在欧洲顶级联赛闪耀的美国球员。直接、双脚均衡、无所畏惧——状态好时是本届最出色的球员之一。'},
      {name:'乔瓦尼·雷纳',role:'进攻中场',jersey:'7',desc:'多特蒙德技术型创造者——史上天赋最高的美国球员。健康时是潜在的世界杯明星。'},
      {name:'泰勒·亚当斯',role:'后腰',jersey:'4',desc:'发动机核心，他的逼抢、位置感和传球使他跻身欧洲顶级球队，掌控整条中场。'}],
    narrative:'以东道主身份怀抱真实雄心——2022年晋级16强，这支球队经验更丰富，博切蒂诺增添了战术纪律性。',
    stakes:'在洛杉矶SoFi球场首战，美国自1994年以来最大的体育赛事。' },

  PRY:{ name:'巴拉圭',
    style:'南美斗志，对抗性强，身体硬朗，防守严密。不会轻易认输——对手需要一寸一寸地争夺每一个机会。',
    tactics:'巴拉圭首先在4-4-2中位防守阵型中稳固防线，随后通过恩西索的速度与技术爆发出猛烈的反击。恩西索是王牌：从深位高速带球推进，凭借盘带从无到有地创造机会。两名中场搭档形成紧凑的双核，赢得二次球后迅速将球转移给前锋。巴拉圭的定位球防守组织极为严密。',
    players:[{name:'米格尔·阿尔米龙',role:'进攻中场',jersey:'10',desc:'纽卡斯尔精力充沛的中场——抗压好，速度快，能在关键时刻打进进球。'},
      {name:'安赫尔·罗梅罗',role:'前锋',jersey:'9',desc:'经验丰富，擅长背身拿球和分球配合。'}],
    narrative:'巴拉圭一贯超额发挥，2010年世界杯曾进入八强。',stakes:'开幕战双方都背水一战，紧张激烈板上钉钉。' },

  AUS:{ name:'澳大利亚',style:'高强度逼抢，身体对抗激烈，整体作战。快速直接，一旦球到脚下立即向前推进。',
    tactics:'澳大利亚4-3-3阵型以莱基从左路分球触发快速过渡进攻为核心。他在左侧通道的速度与内切能力同时提供宽度和射门威胁。三名中场球员动态轮换角色：一人施压、一人补位、一人接应前锋。防守端高压逼抢凶猛，但一旦逼抢被突破，过渡阶段存在被反击的漏洞。',
    players:[{name:'马修·莱基',role:'右边锋',jersey:'11',desc:'2022年对阵丹麦那粒"奇迹之球"的射手。不知疲倦的奔跑，直接，能在关键时刻发挥奇效。墨尔本球迷的最爱。'},
      {name:'内斯托里·伊兰坤达',role:'边锋',jersey:'17',desc:'19岁的拜仁慕尼黑新星，是澳大利亚多年来最令人兴奋的新秀。'},
      {name:'米切尔·杜克',role:'前锋',jersey:'9',desc:'传统9号中锋，空中对抗出色，是澳大利亚进攻的支点。'}],
    narrative:'2022年的奇迹——击败丹麦，进入八强。那支球队鼓舞了一个国家。现在他们要更进一步。墨尔本球迷特别注意！',
    stakes:'澳大利亚对阵美国，可能决定袋鼠军团是否晋级。这或许是澳大利亚足球史上最重要的比赛。' },

  TUR:{ name:'土耳其',
    style:'充满活力，热情奔放。技术型中场配合直接进攻，可以快速切换比赛节奏。',
    tactics:'土耳其4-2-3-1阵型围绕古勒-查汉奥卢轴心运转——古勒在防守者身后的跑位与查汉奥卢精准的长传配合，在对手阵型尚未站稳前制造直接威胁。古勒从右路内切，背身接球后迅速射门——几乎无法防守。查汉奥卢深位组织球权并补防逼抢后留下的空间。两名后卫攻上极高——身后的速度是破解土耳其的关键。',
    players:[{name:'哈坎·恰尔汗奥卢',role:'中场',jersey:'8',desc:'国际米兰中场大师，传球范围极广，掌控节奏，是目前欧洲最好的中场之一。'},
      {name:'阿尔达·居勒尔',role:'进攻中场',jersey:'10',desc:'皇马20岁天才——技术精湛，老成持重。可能成为本届世界杯的一匹黑马。'}],
    narrative:'2002年获得第三名。如今这一激动人心的新生代带着同样的野心回来了。',
    stakes:'居勒尔可能成为小组赛的最大亮点。D组最大悬念。' },

  GER:{ name:'德国',style:'纳格尔斯曼麾下重建——更具进攻性，更有创造力。通过中轴线的技术质量实现高位逼抢。',
    tactics:'德国4-2-3-1阵型以穆西亚拉为逼抢触发者，他从前置中场位置发出信号启动无休止的压迫。基米希在右路大幅攻上，几乎以边锋姿态出现，这让穆西亚拉得以漂移至中路。维尔茨是创造力核心——他在逼仄空间的突破和传球极具决定性。防守转攻的过渡迅速而直接。',
    players:[{name:'弗洛里安·维尔茨',role:'进攻中场',jersey:'10',desc:'勒沃库森的天才，仅22岁，可能是30年来天赋最高的德国球员。盘带、视野和射门出神入化。时刻关注他。'},
      {name:'贾马尔·穆西亚拉',role:'进攻中场',jersey:'10',desc:'拜仁慕尼黑优雅的技术型球员——在狭小空间盘带如行云流水，能打进关键球。与维尔茨一起是世界上最令人兴奋的年轻搭档。'},
      {name:'约书亚·基米希',role:'中场',jersey:'6',desc:'乐队指挥。他的位置感、逼抢和传球范围是德国运转的基础。'}],
    narrative:'2018和2022连续小组赛出局——对四届世界冠军而言奇耻大辱。纳格尔斯曼重建了激情，德国带着真正的信念回来了。',
    stakes:'德国需要弥补两届小组赛出局的耻辱。维尔茨和穆西亚拉提供了足够的天赋。' },

  CIV:{ name:'科特迪瓦',
    style:'身体强悍，打法直接。定位球威胁巨大，全队运动能力出众。',
    tactics:'科特迪瓦通过边路球员单刀突破传中，为强壮的中锋创造机会。4-3-3配置两名勤跑型中场，双向积极覆盖，创造型中场则在对方防线后方寻找口袋空间。防守端两名中场下沉形成4-5-1，保护后防四人组。身体强壮的前锋是定位球时持续的空中威胁。',
    players:[{name:'塞巴斯蒂安·阿勒',role:'前锋',jersey:'9',desc:'多特蒙德强力前锋，曾战胜癌症重返顶级赛场，故事令人动容。靶子型前锋，技术细腻。'},
      {name:'弗兰克·凯西',role:'中场',jersey:'5',desc:'全能型中场机器，力量和节奏能让对手喘不过气。'}],
    narrative:'2024年非洲杯冠军——新一个黄金一代正在崛起。',stakes:'E组暗黑之马，有机会走远。' },

  ECU:{ name:'厄瓜多尔',
    style:'组织严密，打法直接，身体对抗强。南美斗志加务实打法。',
    tactics:'厄瓜多尔4-4-2阵型以恩纳·巴伦西亚的身体统治力为核心——无论是空中对抗还是身后跑动，一切进攻都通过他展开。两名边路中场积极向前逼迫对方后卫，失球后迅速回撤形成紧凑的防守阵型。巴伦西亚支撑球权并将球转移给插上的中场，尤其是第二前锋。防守端意志坚定，保护紧凑的中路区域并以强硬态度争夺二次球。',
    players:[{name:'摩伊塞斯·凯塞多',role:'中场',jersey:'10',desc:'切尔西动感中场，世界上最好的年轻中场之一。他的球权争夺和快速分球都属精英水准。'},
      {name:'恩纳尔·巴伦西亚',role:'前锋',jersey:'13',desc:'老队长，曾在两届世界杯进球，领导力和身体对抗无可替代。'}],
    narrative:'南美洲的崛起之师，拥有凯塞多这位世界级中场。',stakes:'观看凯塞多在中场的主宰表演。' },

  NED:{ name:'荷兰',style:'全攻全守传统遇上现代逼抢，技术质量、积极逼抢和流畅进攻移动。4-3-3已融入他们的基因。',
    tactics:'荷兰4-3-3阵型让加克波不断内切，与中锋和10号形成流畅配合。双后腰释放范戴克前插至中场，在组织阶段制造人数优势。邓弗里斯在右路提供宽度和传中，创造了大多数进球机会。最大弱点在于范戴克前插时身后的空间——拥有速度的对手是他们最大的挑战。',
    players:[{name:'维吉尔·范戴克',role:'中后卫/队长',jersey:'4',desc:'可以说是世界上最好的后卫。他对比赛的解读、空中统治力和沉稳令人赏心悦目——后卫极少有这般霸气。'},
      {name:'科迪·加克波',role:'前锋',jersey:'7',desc:'利物浦左路进攻球员——有创造力，强壮，能打关键球。本届最具爆发力的前锋之一。'},
      {name:'蒂亚尼·赖恩德斯',role:'中场',jersey:'14',desc:'AC米兰的节拍器型中场，以优雅的简洁连接防线与进攻。'}],
    narrative:'三次世界杯决赛（1974、1978、2010）从未夺冠。荷兰人称之为"橙色创伤"。这一次能否终结？',
    stakes:'最有资格夺冠却从未夺冠的球队。34岁的范戴克——这是他真正意义上最后的机会。' },

  JPN:{ name:'日本',
    style:'技术细腻，纪律严明，备战充分。日本的整体智慧在亚洲无与伦比——协调一致的波浪式逼抢，技术全面出色。',
    tactics:'日本4-2-3-1阵型采用亚洲足球中最精密的逼抢体系之一——协调一致的波浪式压迫将对手窒息在本方半场。久保建英担任创造力核心，回撤至防线之间接球后与两翼前锋快速配合。远藤航与田中碧组成的双后腰逼抢不止且持球技术出色。最大的软肋在于定位球防守，缺乏高度是结构性弱点。',
    players:[{name:'久保建英',role:'进攻中场',jersey:'8',desc:'皇家社会技术型创造者，速度极快，善于在狭小空间活动，能无中生有制造进球机会。'},
      {name:'三笘薰',role:'左边锋',jersey:'9',desc:'布莱顿的盘带机器，重心低，球技精湛，几乎无法被断球。真正的明星球员。'}],
    narrative:'2022年小组赛连克德国和西班牙——任何人都不应轻视日本。',stakes:'日本具备深度晋级的实力，技术和团队凝聚力足以匹敌任何球队。' },

  BEL:{ name:'比利时',
    style:'新生代崛起，"黄金一代"已成历史，年轻面孔接棒。快速转换和技术质量仍是核心。',
    tactics:'比利时4-2-3-1阵型围绕德布劳内的中心位置构建创造力——他在防线之间接球，打出穿透性的身后直塞，并晚插禁区发起远射。卢卡库的身体存在感支撑球权并为德布劳内的晚插创造空间。多库和特罗萨尔从宽边位置提供速度和直接突破。防守端退入紧凑的4-4-2中位阵型——最大弱点是当对手在阵型尚未重组时打出高节奏进攻。',
    players:[{name:'洛伊斯·奥彭达',role:'前锋',jersey:'9',desc:'RB莱比锡的电光石火型前锋，对方身后的速度和临门一脚使他成为欧洲最危险的前锋之一。'},
      {name:'阿马杜·奥纳纳',role:'中场',jersey:'5',desc:'阿斯顿维拉强壮且技术全面的中场，覆盖面极广，善于发动进攻。'}],
    narrative:'黄金一代从未赢得大赛。现在新一代有机会真正实现突破。',stakes:'下一代能否完成黄金一代未竟的事业？' },

  ESP:{ name:'西班牙',style:'位置球掌控大师——本届技术最全面的球队。短传配合，智能跑位，高位逼抢。2024年欧洲杯冠军，本届最有力的夺冠热门。',
    tactics:'西班牙4-3-3阵型是当今世界足球中最精密的阵地战体系——佩德里与加维搭档内侧中场，通过不停的跑位和一触式配合在中路制造人数优势。亚马尔从右路的盘带提供直接威胁，罗德里从深位掌控节奏。防守端十人整体施压——在对方半场数秒内即可完成回球。逼抢触发信号是长传球：当对手打长传时，西班牙立即逼抢落点二次球。',
    players:[{name:'拉明·亚马尔',role:'右边锋',jersey:'19',desc:'18岁，已是世界上最出色的年轻球员。2024年欧洲杯对阵法国时打进惊天世界波。他的技术、沉稳和创造力令人叹为观止——很难相信他还是个少年。'},
      {name:'佩德里',role:'中场核心',jersey:'8',desc:'中场大师——他在狭小空间接球、晃开防守和选择传球路线的能力堪称享受。'},
      {name:'罗德里',role:'后腰',jersey:'16',desc:'金球奖得主。西班牙的防守盾牌和首席调度者，极少失误，总比对手早一步读懂比赛。'},

  URU:{ name:'乌拉圭',
    style:'乌拉圭铁血精神。战术老练，防守凶悍，拥有世界级进攻人才。',
    tactics:'乌拉圭4-4-2阵型以巴尔韦德高速带球从中场发起推进，以第三前锋姿态杀入禁区为特色。努涅斯与达尔文无所畏惧地率先压上，从前场发动高强度的协同逼抢。双后腰积极保护后防四人组。进攻与防守端的定位球都是真正的武器——巴尔韦德和努涅斯均能从死球中得分。',
    players:[{name:'费德里科·巴尔韦德',role:'中场',jersey:'15',desc:'皇马不知疲倦的发动机，跑遍每一寸草皮，能打世界波，拥有中场球员中最大的"发动机"。绝对精英。'},

  FRA:{ name:'法国',style:'技术质量与身体力量的完美融合。可以打控球足球，也可以在反击中摧毁对手。球员深度无与伦比，轮换无需牺牲质量。',
    tactics:'法国4-3-3阵型围绕中锋姆巴佩的跑动构建——他回撤至深位打配合，随后用毁灭性的速度利用身后的空间。格列兹曼担任伪9号或第二前锋，以智能跑位串联中场与进攻线。乔阿门尼在深位担任单后腰，卡马文加和拉比奥特提供双向奔跑的能量。防守端组织极为严密，通过姆巴佩速度完成攻守转换往往具有致命性。',
    players:[{name:'基利安·姆巴佩',role:'中锋',jersey:'10',desc:'世界足坛速度最快、也最出色的球员之一。距离打破世界杯历史最多进球纪录仅差5球。他的加速度、射门和视野使他与众不同——他持球的每一秒都要盯紧。'},
      {name:'安托万·格列兹曼',role:'进攻中场',jersey:'7',desc:'法国的创造性大脑，聪明的线间跑位和大场面发挥使他成为世界足坛最重要的球员之一。'},
      {name:'马科斯·图拉姆',role:'前锋',jersey:'9',desc:'国际米兰的强力前锋，力量、速度和聪明走位使他成为姆巴佩的完美搭档。'}],

  SEN:{ name:'塞内加尔',
    style:'强壮有力，技术娴熟。当塞内加尔雄狮高强度逼抢时，极难被正面穿越。',
    tactics:'塞内加尔4-3-3阵型围绕马内的双重性构建——他既能打宽边前锋也能担任真正的中锋，其跑动几乎无法被盯防。加纳·盖耶积极保护后防线，赢球后迅速将球分配给前锋。两翼前锋利用宽度创造1v1局面并将球传入禁区。最大的挑战在于对手在高位积极施压、在他们的组织阶段赢得球权。',
    players:[{name:'萨迪奥·马内',role:'前锋',jersey:'10',desc:'传奇进攻球员，31岁但仍能展现非凡才华。他在利物浦的职业生涯辉煌无比，承载着全国人民的希望。'},

  NOR:{ name:'挪威',
    style:'打法直接，身体强悍，禁区前令人生畏。哈兰德一旦拿到危险区域的球，必有威胁。',
    tactics:'挪威体系以哈兰德为绝对核心——中场四人为他的身后跑动制造空间，打法直接快速，尽量压缩持球时间。两翼前锋拉伸对方防线，中路中场则晚插入禁区策应。防守端4-4-2中位阵型一旦赢得球权即刻转换进攻——过渡速度达到顶级水准。',
    players:[{name:'厄林·哈兰德',role:'前锋',jersey:'9',desc:'进球机器。曼城前锋打破了他面前的每一项进球纪录。他的身体素质、射门本能和禁区统治力使他成为世界上最令守门员胆寒的中锋。每次他在禁区得球——请起立。'}],
    narrative:'自1998年后首次参加世界杯！哈兰德从未出现在大型国际赛事，直到现在。世界终于能看到哈兰德体验了。',
    stakes:'哈兰德对姆巴佩——同在I组。世界上两位最可怕的射手在小组赛就狭路相逢，必看之战。' },

  ARG:{ name:'阿根廷',style:'战术灵活，难以攻克。防守纪律严明，反击致命。需要时能打防守反击，必要时能开放进攻。',
    tactics:'阿根廷4-3-3阵型完全围绕为梅西创造在最佳位置接球的条件而构建——在右侧防线之间的空间，他可以直面防守者突破或打出致命直塞球。德保罗不知疲倦的奔跑和双向能量保护梅西，迪马利亚提供宽度和直接突破的威胁。防守端以4-4-2阵型收缩，奥坦迪的身体强度是中路的关键。中场的控制始终是核心战术博弈：若德保罗和麦卡利斯特掌控中路，阿根廷几乎无懈可击。',
    players:[{name:'莱昂内尔·梅西',role:'队长/前锋',jersey:'10',desc:'史上最伟大的球员，如今更是世界杯冠军。38岁的他或许迎来最后一届世界杯，但他的传球、视野和定位球依然超凡入圣。他的每一次触球都是历史——不要移开视线。'},
      {name:'胡利安·阿尔瓦雷斯',role:'前锋',jersey:'9',desc:'2022年世界杯最大惊喜，灵动、聪明的跑位，射门精准。24岁，这届世界杯是他向世界宣告自己的舞台。'},
      {name:'恩佐·费尔南德斯',role:'中场',jersey:'24',desc:'切尔西的发动机——防守、进攻、射门、助攻无所不能，对阿根廷体系至关重要。'}],
    narrative:'卫冕冠军——2022年赢得世界杯，结束了36年的等待。梅西高举奖杯的那一幕成为永恒。',
    stakes:'梅西的告别之旅。如果这是他最后一届世界杯，每一刻都弥足珍贵。全世界都在看。' },

  POR:{ name:'葡萄牙',style:'全队技术质量出色，宽边进攻，中场与进攻线之间的配合默契。马丁内斯建立了真正的团队精神，不再只依赖罗纳尔多。',
    tactics:'葡萄牙4-2-3-1阵型以罗纳尔多担任中锋——他的跑位、空中对抗能力和精准射门让他在任何场合都具有威胁。布鲁诺·费尔南德斯担任10号，用出色的传球范围创造机会并自己插入禁区。贝尔纳多·席尔瓦是连接者——他在逼仄空间的智慧与技术串联中场与进攻。鲁本·内维斯和卡瓦略组成的双后腰保护后防线，内维斯凭借传球范围控制节奏。',
    players:[{name:'克里斯蒂亚诺·罗纳尔多',role:'队长/前锋',jersey:'7',desc:'足球史上荣誉最多的球员。41岁，这或许是他辉煌职业生涯的最终篇章。仍能在关键时刻迸发天才之作，定位球、走位和射门依然属于精英水准。历史在见证。'},
      {name:'拉斐尔·莱奥',role:'左边锋',jersey:'11',desc:'AC米兰的电光石火型进攻球员——全速运转时无可阻挡。速度、技巧和进球能力使他成为葡萄牙最危险的武器。'},
      {name:'贝尔纳多·席尔瓦',role:'中场',jersey:'10',desc:'曼城技术大师，聪明的位置感、传球和进球能力，是球队的心脏。'}],
    narrative:'赢得2016年欧洲杯，2022年八强点球不敌摩洛哥。罗纳尔多唯一缺少的就是世界杯冠军，这是他最后的机会。',
    stakes:'罗纳尔多最后的世界杯，41岁的终章。葡萄牙全国，以及很大一部分球迷，希望他最终能举起这座奖杯。' },

  COL:{ name:'哥伦比亚',
    style:'进取积极，技术全面，2024年美洲杯决赛经验加持，充满自信。快速转换和富有创意的进攻是核心。',
    tactics:'哥伦比亚4-2-3-1阵型富有创意且灵动自如——哈梅斯·罗德里格斯担任自由的10号，游走于各个位置之间，凭借视野和技术质量制造机会。路易斯·迪亚斯与夸德拉多结合智慧与速度向对方身后发动进攻，中路中场则补防哈梅斯离开的空间。进攻充满想象力且难以预测——他们依赖技术质量和个人创造力，而非固定体系。',
    players:[{name:'路易斯·迪亚斯',role:'左边锋',jersey:'7',desc:'利物浦的电光石火型边锋，直接突破、速度和过人每次持球都会制造危险。'},

    stakes:'哥伦比亚真正有能力冲击四强，路易斯·迪亚斯状态惊人。' },

  ENG:{ name:'英格兰',style:'防守稳固，组织严密。优势在于个人质量——前三线和中场均属世界级，定位球是重要武器。',
    tactics:'英格兰4-3-3阵型以贝林厄姆从深位晚插入禁区为最大特色——这种跑动几乎无法被防守。萨卡和福登以内侧前锋姿态从宽边内切，中锋支撑球权串联进攻。特伦特·亚历山大-阿诺德的深位组织角色在中路制造人数优势，用大范围传球完成转移并将对手后卫置于1v1困境。防守端以协调一致的波浪式压迫，前三叉通过封堵简单传球路线触发逼抢。',
    players:[{name:'哈里·凯恩',role:'前锋/队长',jersey:'9',desc:'英格兰历史最佳射手，效力拜仁慕尼黑。他的跑位、背身拿球和射门使他跻身世界最优秀前锋之列。承载巨大压力，但从容应对。'},
      {name:'朱德·贝林厄姆',role:'中场',jersey:'5',desc:'皇马的全能型奇才——22岁，可以说已是世界上最好的中场。持球时充满爆炸性，能从中场打进进球，逼抢不知疲倦。英格兰的核心。'},
      {name:'德克兰·莱斯',role:'后腰',jersey:'4',desc:'阿森纳的中场将军——他的断球和向前传球给英格兰带来控制权和安全感。世界级。'}],
    narrative:'1966年夺冠，此后再未举起大力神杯。2018年四强，2021年和2024年欧洲杯决赛——永远是陪跑。黄金一代必须兑现了。',
    stakes:'60年的痛。凯恩、贝林厄姆和莱斯是这段时间里英格兰最强的一代。如果他们现在不能赢，更待何时？' },

  CRO:{ name:'克罗地亚',
    style:'技术出众，战术严谨。莫德里奇从深处掌控一切——克罗地亚式打法是耐心控球后的致命一击。',
    tactics:'克罗地亚4-3-3阵型建立在布罗佐维奇-莫德里奇轴心之上——布罗佐维奇在后防线前方拦截，莫德里奇以自由8号姿态在逼仄空间接球并以惊人的精准度组织出球。科瓦奇从中场发起推进策应前锋并提供直接的带球突破。防守端在紧凑的中位阵型中防守，其整齐的防线极难被穿透。进攻端耐心持球，通过中场环节持续渗透直至完美机会出现。',
    players:[{name:'卢卡·莫德里奇',role:'中场/队长',jersey:'10',desc:'39岁的天才。金球奖得主，2018年世界杯金球奖得主。他的触球、视野和比赛阅读依然超越时间的艺术。观看莫德里奇踢球就是欣赏一位大师的杰作。这可能是他最后一届世界杯。'},
      {name:'马泰奥·科瓦奇',role:'中场',jersey:'8',desc:'曼城技术型发电机——不停逼抢和精准传球使他成为莫德里奇的完美搭档。'}],
    narrative:'2018年亚军，2022年第三名。克罗地亚仅有400万人口（与墨尔本相当！），却持续进入世界杯四强。莫德里奇的谢幕之作即将上演。',
    stakes:'莫德里奇的故事如何落幕？英格兰对阵克罗地亚呼应了2018年半决赛，那次克罗地亚赢了。' },

function saveScoresToStorage() {
  const data = {};
  MATCHES.forEach(m => {
    if (m.score || m.isFinal) {
      data[m.id] = { score: m.score, isFinal: m.isFinal, isLive: m.isLive, liveMinute: m.liveMinute, finalTime: m.finalTime, goals: m.goals || [] };
    }
  });
  try { localStorage.setItem('wcg_scores', JSON.stringify(data)); } catch(e) {}
}

function loadScoresFromStorage() {
  try {
    const data = JSON.parse(localStorage.getItem('wcg_scores') || '{}');
    MATCHES.forEach(m => {
      if (data[m.id]) {
        Object.assign(m, data[m.id]);
      }
    });
  } catch(e) {}
}

    const today = new Date();
    const tournamentStart = new Date('2026-06-11'); // day before opening, catches UTC-edge games
    const days = [];
    for (let d = new Date(tournamentStart); d <= new Date(today.getTime() + 86400000); d = new Date(d.getTime() + 86400000)) {
      days.push(fmtDate(d));
    }
    // Cap at 10 days to avoid excessive requests during group stage
    const daysToFetch = days.slice(-10);
    const responses = await Promise.all(daysToFetch.map(date =>
      fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${date}`)
        .then(r => r.json()).catch(() => ({events:[]}))
    ));
    // Deduplicate events by id
    const seen = new Set();
    const events = responses.flatMap(d => d.events || []).filter(e => {
      if (seen.has(e.id)) return false;
      seen.add(e.id);
      return true;
    });
    console.log('[WCG] ESPN events:', events.length, events.map(e => {
      const comp = e.competitions?.[0];
      const teams = comp?.competitors?.map(c => `${c.homeAway}:${c.team?.displayName}(${c.score})`).join(' vs ');
      return `${teams} [${comp?.status?.type?.state}/${comp?.status?.displayClock}]`;
    }));

    let anyChange = false;
    for (const ev of events) {
      const comp = ev.competitions?.[0];
      if (!comp) continue;

      const homeTeamName = comp.competitors?.find(c => c.homeAway === 'home')?.team?.displayName || '';
      const awayTeamName = comp.competitors?.find(c => c.homeAway === 'away')?.team?.displayName || '';
      const homeCode = ESPN_TEAM_MAP[homeTeamName];
      const awayCode = ESPN_TEAM_MAP[awayTeamName];

      // Find matching MATCHES entry by team codes
      const match = MATCHES.find(m =>
        (m.home === homeCode && m.away === awayCode) ||
        (m.home === awayCode && m.away === homeCode)
      );
      if (!match) { console.log('[WCG] no match for', homeTeamName, '(' + homeCode + ') vs', awayTeamName, '(' + awayCode + ')'); continue; }

      const status = comp.status?.type;
      const isInProgress = status?.state === 'in';
      const isComplete = status?.state === 'post';

      const homeScore = parseInt(comp.competitors?.find(c => c.homeAway === 'home')?.score || '0');
      const awayScore = parseInt(comp.competitors?.find(c => c.homeAway === 'away')?.score || '0');
      const clock = comp.status?.displayClock || '';

      const prevIsLive = match.isLive;
      const prevScore = match.score ? match.score.join('-') : '';

      match.isLive = isInProgress;
      match.isFinal = isComplete;
      if (isInProgress || isComplete) {
        if (match.home === homeCode) {
          match.score = [homeScore, awayScore];
        } else {
          match.score = [awayScore, homeScore];
        }
      } else {
        // ESPN says pre — clear any wrongly stored score
        match.score = null;
        match.finalTime = null;
      }
      match.liveMinute = isInProgress ? clock : '';
      if (isComplete) match.finalTime = clock;

      // Extract goalscorers from comp.details
      const homeId = comp.competitors?.find(c => c.homeAway === 'home')?.team?.id;
      const awayId = comp.competitors?.find(c => c.homeAway === 'away')?.team?.id;
      const swapped = match.home !== homeCode;
      const goals = (comp.details || [])
        .filter(d => d.scoringPlay)
        .map(d => {
          const minute = d.clock?.displayValue || '';
          const name = d.athletesInvolved?.[0]?.displayName || '';
          const isOG = d.type?.text?.toLowerCase().includes('own goal');
          const espnSide = d.team?.id === homeId ? 'home' : 'away';
          const side = swapped ? (espnSide === 'home' ? 'away' : 'home') : espnSide;
          return { name, minute, side, isOG };
        });
      if (goals.length) match.goals = goals;

      const newScore = match.score ? match.score.join('-') : '';
      if (prevIsLive !== match.isLive || prevScore !== newScore) anyChange = true;
    }

    if (anyChange) {
      saveScoresToStorage();
      updateKnockoutTabLabel();
      renderSchedulePanel();
      if (selectedMatchId) selectMatch(selectedMatchId);
    }

    // Speed up polling when a match is live
    const hasLive = MATCHES.some(m => m.isLive);
    schedulePoll(hasLive ? 30000 : 60000);
  } catch (e) {
    // silently fail, try again in 60s
    schedulePoll(60000);
  }
}

function schedulePoll(ms) {
  if (_pollTimer) clearTimeout(_pollTimer);
  _pollTimer = setTimeout(fetchLiveScores, ms);
}

// ── Group Standings ─────────────────────────────────────────────────────────
const STANDINGS = {}; // code → { p, w, d, l, pts, gd, gf, ga }
let _standingsTimer = null;

async function fetchStandings() {
  try {
    const r = await fetch('https://site.api.espn.com/apis/v2/sports/soccer/fifa.world/standings');
    const data = await r.json();
    const groups = data.children || [];
    let anyChange = false;

    for (const group of groups) {
      const entries = group.standings?.entries || [];
      for (const entry of entries) {
        const teamName = entry.team?.displayName || '';
        const code = ESPN_TEAM_MAP[teamName];
        if (!code) { console.log('[WCG] standings: no code for', teamName); continue; }
        const getStat = name => entry.stats?.find(s => s.name === name)?.value ?? 0;
        const w = getStat('wins');
        const l = getStat('losses');
        const d = getStat('ties');
        const gf = getStat('pointsFor');
        const ga = getStat('pointsAgainst');
        const pts = w * 3 + d;
        const gd = gf - ga;
        const prev = STANDINGS[code];
        if (!prev || prev.pts !== pts || prev.gd !== gd) anyChange = true;
        STANDINGS[code] = { p: w + d + l, w, d, l, pts, gd, gf, ga };
      }
    }

    if (anyChange && activeTab === 'groups') renderSchedulePanel();
  } catch(e) {
    console.warn('[WCG] standings fetch failed:', e);
  }
  _standingsTimer = setTimeout(fetchStandings, 3 * 60 * 1000);
}

// Kick off immediately, then poll
fetchLiveScores();
fetchStandings();

loadScoresFromStorage(); // restore previously fetched scores before first render
setLocation('Australia/Sydney'); // init — must run after all let declarations
updateKnockoutTabLabel();
renderSchedulePanel();
</script>
