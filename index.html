<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 World Cup Guide – Melbourne</title>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --border: #2a3550;
    --gold: #f5a623;
    --gold2: #e8962a;
    --text: #e8eaf0;
    --muted: #7c8aab;
    --accent: #3b82f6;
    --green: #22c55e;
    --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0a0e1a 0%, #1a2a4a 50%, #0a1628 100%);
    border-bottom: 2px solid var(--gold);
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .header-title { display: flex; align-items: center; gap: 14px; }
  .trophy { font-size: 32px; }
  h1 { font-size: 22px; font-weight: 800; color: var(--gold); letter-spacing: -0.5px; }
  h1 span { color: var(--text); font-weight: 400; font-size: 14px; display: block; }
  .melbourne-time { text-align: right; width: 160px; flex-shrink: 0; }
  .time-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .time-display { font-size: 17px; font-weight: 500; color: var(--gold); }
  .date-display { font-size: 12px; color: var(--muted); }
  .location-wrapper { position: relative; display: inline-flex; align-items: center; gap: 5px; cursor: pointer; margin-bottom: 4px; }
  .location-icon { flex-shrink: 0; display: block; }
  .location-name { font-size: 12px; color: var(--text); }
  .location-select {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%;
    -webkit-appearance: none; appearance: none;
  }

  /* NAV TABS */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; gap: 0; }
  .tab { padding: 14px 22px; cursor: pointer; font-weight: 600; font-size: 14px; color: var(--muted); border-bottom: 3px solid transparent; transition: all 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* LAYOUT */
  .app { display: flex; height: calc(100vh - 112px); overflow: hidden; }
  .schedule-panel { width: 420px; min-width: 420px; overflow-y: auto; border-right: 1px solid var(--border); }
  .detail-panel { flex: 1; overflow-y: auto; }

  /* SECTION HEADERS */
  .section-header {
    padding: 16px 20px 10px;
    position: sticky; top: 0; z-index: 10;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .section-header h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gold); font-weight: 700; }
  .section-header p { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* DATE GROUP */
  .date-group { margin-bottom: 4px; }
  .date-label {
    padding: 8px 20px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .date-label.today { color: var(--gold); background: rgba(245,166,35,0.08); }
  .today-badge { background: var(--gold); color: #000; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 800; }

  /* MATCH CARD */
  .match-card {
    padding: 14px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
    display: flex; flex-direction: column; gap: 6px;
  }
  .match-card:hover { background: var(--surface2); border-left-color: var(--border); }
  .match-card.selected { background: var(--surface2); border-left-color: var(--gold); }
  .match-card.live { border-left-color: var(--green); }
  .match-meta { display: flex; justify-content: space-between; align-items: center; }
  .match-group { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); font-weight: 700; }
  .match-time { font-size: 11px; color: var(--muted); }
  .match-time.live-time { color: var(--green); font-weight: 700; }
  .match-teams { display: flex; align-items: center; gap: 10px; }
  .team-display { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .team-display.right { flex-direction: row-reverse; }
  .flag { font-size: 22px; flex-shrink: 0; }
  .team-name { font-weight: 700; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .score-display { font-size: 18px; font-weight: 800; color: var(--gold); min-width: 50px; text-align: center; }
  .vs { font-size: 11px; color: var(--muted); min-width: 30px; text-align: center; }
  .match-venue { font-size: 11px; color: var(--muted); }
  .rating { display: flex; gap: 2px; }
  .star { color: var(--gold); font-size: 10px; }
  .star.empty { color: var(--border); }

  /* DETAIL PANEL */
  .detail-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--muted); gap: 16px;
  }
  .detail-empty .icon { font-size: 64px; }
  .detail-empty p { font-size: 14px; }

  .detail-content { padding: 0 0 40px; }

  /* MATCH HERO */
  .match-hero {
    background: linear-gradient(135deg, #0d1928, #1a2a4a, #0d1928);
    padding: 28px 32px;
    border-bottom: 1px solid var(--border);
  }
  .hero-group { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 12px; font-weight: 700; }
  .hero-matchup { display: flex; align-items: center; gap: 20px; margin-bottom: 16px; }
  .hero-team { flex: 1; text-align: center; }
  .hero-flag { font-size: 56px; display: block; margin-bottom: 8px; }
  .hero-name { font-size: 20px; font-weight: 800; }
  .hero-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .hero-vs { font-size: 14px; color: var(--muted); font-weight: 600; min-width: 60px; text-align: center; }
  .hero-score { font-size: 40px; font-weight: 900; color: var(--gold); }
  .hero-info { display: flex; gap: 20px; flex-wrap: wrap; }
  .hero-info-item { font-size: 12px; color: var(--muted); }
  .hero-info-item strong { color: var(--text); }
  .hero-status { display: inline-flex; align-items: center; gap: 6px; background: rgba(245,166,35,0.15); border: 1px solid var(--gold); border-radius: 20px; padding: 4px 12px; margin-bottom: 12px; font-size: 12px; color: var(--gold); font-weight: 700; }
  .live-dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* SECTIONS */
  .section { padding: 24px 32px; border-bottom: 1px solid var(--border); }
  .section h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gold); font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .section h3 span { font-size: 16px; }

  /* PREDICTION BAR */
  .prediction { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .pred-label { font-size: 12px; color: var(--muted); width: 80px; }
  .pred-bar-wrap { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; display: flex; }
  .pred-bar-home { height: 100%; background: var(--accent); transition: width 0.5s; }
  .pred-bar-draw { height: 100%; background: var(--muted); }
  .pred-bar-away { height: 100%; background: var(--gold); }
  .pred-pct { font-size: 12px; font-weight: 700; width: 36px; text-align: right; }
  .home-pct { color: var(--accent); }
  .away-pct { color: var(--gold); }
  .draw-pct { color: var(--muted); }

  /* TEAM COMPARISON */
  .team-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .team-col { }
  .team-col-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--border); }
  .team-col-header .flag { font-size: 24px; }
  .team-col-header h4 { font-size: 15px; font-weight: 800; }

  /* PLAYER CARD */
  .player-card { background: var(--surface); border-radius: 8px; padding: 12px; margin-bottom: 8px; border: 1px solid var(--border); }
  .player-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .player-role { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .player-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }

  /* TACTICS */
  .tactic-item { background: var(--surface); border-radius: 8px; padding: 14px; margin-bottom: 10px; border-left: 3px solid var(--accent); }
  .tactic-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); font-weight: 700; margin-bottom: 4px; }
  .tactic-text { font-size: 13px; line-height: 1.6; }

  /* TALKING POINTS */
  .talking-points { display: flex; flex-direction: column; gap: 10px; }
  .tp { display: flex; gap: 12px; align-items: flex-start; background: var(--surface); border-radius: 8px; padding: 12px; }
  .tp-icon { font-size: 18px; flex-shrink: 0; }
  .tp-text { font-size: 13px; line-height: 1.6; }

  /* STAKES */
  .stakes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stakes-card { background: var(--surface); border-radius: 8px; padding: 14px; }
  .stakes-flag { font-size: 28px; margin-bottom: 6px; }
  .stakes-team { font-size: 12px; font-weight: 700; color: var(--gold); margin-bottom: 6px; }
  .stakes-text { font-size: 12px; color: var(--muted); line-height: 1.5; }

  /* FORMATION */
  .formation-label { font-size: 28px; font-weight: 900; color: var(--gold); }
  .formation-sub { font-size: 12px; color: var(--muted); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* GROUPS VIEW */
  .groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; padding: 20px; }
  .group-card { background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
  .group-title { background: var(--surface2); padding: 10px 14px; font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); }
  .group-team { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-top: 1px solid var(--border); cursor: pointer; }
  .group-team:hover { background: var(--surface2); }
  .group-team .flag { font-size: 18px; }
  .group-team-name { font-size: 13px; font-weight: 600; flex: 1; }
  .group-team-rank { font-size: 11px; color: var(--muted); }

  .hidden { display: none !important; }

  /* LANGUAGE TOGGLE */
  .lang-toggle {
    display: inline-flex; border: 1px solid var(--border); border-radius: 20px; overflow: hidden;
  }
  .lang-btn {
    padding: 5px 13px; border: none; background: transparent; color: var(--muted);
    cursor: pointer; font-size: 12px; font-weight: 700; transition: all 0.2s; font-family: inherit;
  }
  .lang-btn:first-child { border-right: 1px solid var(--border); }
  .lang-btn.active { background: var(--gold); color: #000; }
  .lang-btn:hover:not(.active) { color: var(--gold); }

  @media (max-width: 768px) {
    .app { flex-direction: column; height: auto; }
    .schedule-panel { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(--border); max-height: 50vh; }
  }
</style>
</head>
<body>

<header>
  <div class="header-title">
    <span class="trophy">🏆</span>
    <div>
      <h1>2026 World Cup Guide</h1>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:16px;margin-left:auto">
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" data-lang="zh" onclick="setLang('zh')">中文</button>
    </div>
    <div class="melbourne-time">
      <div class="location-wrapper">
        <svg class="location-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 1 8 8c0 5.25-8 14-8 14S4 15.25 4 10a8 8 0 0 1 8-8z"/>
        </svg>
        <span class="location-name" id="locationName">Melbourne / Sydney</span>
        <select class="location-select" id="locationSelect" onchange="setLocation(this.value)">
          <option value="Australia/Sydney">🇦🇺 Melbourne / Sydney</option>
          <option value="Australia/Brisbane">🇦🇺 Brisbane</option>
          <option value="Australia/Adelaide">🇦🇺 Adelaide</option>
          <option value="Australia/Darwin">🇦🇺 Darwin</option>
          <option value="Australia/Perth">🇦🇺 Perth</option>
          <option value="Asia/Shanghai">🇨🇳 Beijing / Shanghai</option>
        </select>
      </div>
      <div class="time-display" id="clock">--:--</div>
      <div class="date-display" id="datedisp">--</div>
    </div>
  </div>
</header>

<nav>
  <div class="tab active" id="tab-today" onclick="switchTab('today')">⚡ Today</div>
  <div class="tab" id="tab-schedule" onclick="switchTab('schedule')">📅 Schedule</div>
  <div class="tab" id="tab-groups" onclick="switchTab('groups')">🌍 Groups</div>
</nav>

<div class="app">
  <!-- LEFT: SCHEDULE LIST -->
  <div class="schedule-panel" id="schedulePanel">
    <div id="matchList"></div>
  </div>

  <!-- RIGHT: DETAIL PANEL -->
  <div class="detail-panel" id="detailPanel">
    <div class="detail-empty" id="detailEmpty">
      <span class="icon">⚽</span>
      <p>Select a match to see players, tactics & what to watch</p>
    </div>
    <div class="detail-content hidden" id="detailContent"></div>
  </div>
</div>

// ══════════════════════════════════════
//  UTILITY FUNCTIONS
// ══════════════════════════════════════
// ── Location / Timezone ──────────────────────────────
const LOCATION_LABELS = {
  'Australia/Sydney':    'AEST',
  'Australia/Brisbane':  'AEST',
  'Australia/Adelaide':  'ACST',
  'Australia/Darwin':    'ACST',
  'Australia/Perth':     'AWST',
  'Asia/Shanghai':       'CST',
  'Asia/Hong_Kong':      'HKT',
};
let currentTZ = 'Australia/Sydney';


function setLocation(tz) {
  currentTZ = tz;
  // compute UTC offset correctly by comparing tz-local vs UTC locale strings
  const d = new Date();
  const totalMin = Math.round(
    (new Date(d.toLocaleString('en-US', {timeZone: tz})) -
     new Date(d.toLocaleString('en-US', {timeZone: 'UTC'}))) / 60000
  );
  const h = Math.floor(Math.abs(totalMin) / 60);
  const m = Math.abs(totalMin) % 60;
  const sign = totalMin >= 0 ? '+' : '-';
  const offsetStr = m ? `UTC${sign}${h}:${String(m).padStart(2,'0')}` : `UTC${sign}${h}`;

  const sel = document.getElementById('locationSelect');
  const nameEl = document.getElementById('locationName');
  if (sel && nameEl) nameEl.textContent = sel.options[sel.selectedIndex].text.replace(/^\S+\s/, '');
  renderSchedulePanel();
  if (selectedMatchId) selectMatch(selectedMatchId);
  updateClock();
}

function toLocalTZ(utcStr) {
  // returns a Date shifted so that UTC methods give local-time values
  const d = new Date(utcStr);
  const localStr = d.toLocaleString('en-US', { timeZone: currentTZ });
  return new Date(localStr);
}

function formatAESTDate(utcStr) {
  return new Date(utcStr).toLocaleDateString('en-AU', {
    weekday:'short', day:'numeric', month:'short', timeZone: currentTZ
  });
}

function formatAESTTime(utcStr) {
  return new Date(utcStr).toLocaleTimeString('en-AU', {
    hour:'2-digit', minute:'2-digit', hour12:true, timeZone: currentTZ
  });
}

function isToday(utcStr) {
  const todayLocal = new Date().toLocaleDateString('en-AU', { timeZone: currentTZ });
  const matchLocal = new Date(utcStr).toLocaleDateString('en-AU', { timeZone: currentTZ });
  return todayLocal === matchLocal;
}

function isLive(utcStr, matchId) {
  if (matchId !== undefined && MATCHES.find(m => m.id === matchId)?.isLive) return true;
  const now = new Date();
  const matchTime = new Date(utcStr);
  const diff = (now - matchTime) / 60000;
  return diff >= 0 && diff <= 105;
}

function isPast(utcStr, matchId) {
  if (matchId !== undefined) {
    const m = MATCHES.find(x => x.id === matchId);
    if (m?.isFinal) return true;
    if (m?.isLive) return false;
  }
  return new Date() > new Date(new Date(utcStr).getTime() + 105*60000);
}

function stars(n) {
  return '★'.repeat(n) + '☆'.repeat(5-n);
}

// ══════════════════════════════════════
//  CLOCK
// ══════════════════════════════════════
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-AU', {
    hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false, timeZone: currentTZ
  });
  document.getElementById('datedisp').textContent = now.toLocaleDateString('en-AU', {
    weekday:'long', day:'numeric', month:'long', timeZone: currentTZ
  });
}
setInterval(updateClock, 1000);

  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    const tabs = ['today','schedule','groups'];
    t.classList.toggle('active', tabs[i] === tab);
  });
  renderSchedulePanel();
  if (tab === 'groups') {
    document.getElementById('detailPanel').classList.add('hidden');
    document.getElementById('schedulePanel').style.width = '100%';
    document.getElementById('schedulePanel').style.minWidth = '100%';
  } else {
    document.getElementById('detailPanel').classList.remove('hidden');
    document.getElementById('schedulePanel').style.width = '420px';
    document.getElementById('schedulePanel').style.minWidth = '420px';
  }
}

// ══════════════════════════════════════
//  SCHEDULE PANEL
// ══════════════════════════════════════
function renderSchedulePanel() {
  const list = document.getElementById('matchList');
  list.innerHTML = '';

  if (activeTab === 'groups') {
    renderGroupsView(list);
    return;
  }

  let matches = [...MATCHES];
  if (activeTab === 'today') {
    matches = matches.filter(m => isToday(m.utc));
  }

  // Group by date
  const byDate = {};
  matches.forEach(m => {
    const dateKey = formatAESTDate(m.utc);
    if (!byDate[dateKey]) byDate[dateKey] = [];
    byDate[dateKey].push(m);
  });

  const todayStr = formatAESTDate(new Date().toISOString());

  if (activeTab === 'today' && matches.length === 0) {
    list.innerHTML = `<div style="padding:40px 20px;text-align:center;color:var(--muted)"><div style="font-size:40px;margin-bottom:12px">📺</div><p style="font-size:14px">${u('noMatches')}</p><p style="font-size:12px;margin-top:8px">${u('noMatchesSub')}</p></div>`;
    return;
  }

  const hdr = document.createElement('div');
  hdr.className = 'section-header';
  hdr.innerHTML = activeTab === 'today'
    ? `<h2>${u('todayHdr')}</h2><p>${u('todaySub')}</p>`
    : `<h2>${u('schedHdr')}</h2><p>${u('schedSub')}</p>`;
  list.appendChild(hdr);

  Object.entries(byDate).sort((a,b) => a[0].localeCompare(b[0])).forEach(([dateKey, dayMatches]) => {
    dayMatches.sort((a,b) => new Date(a.utc) - new Date(b.utc));
    const isT = dateKey === todayStr;
    const dg = document.createElement('div');
    dg.className = 'date-group';

    const dl = document.createElement('div');
    dl.className = 'date-label' + (isT ? ' today' : '');
    dl.innerHTML = `<span>${dateKey}${isT ? ' – ' + u('today') : ''}</span>`;
    dg.appendChild(dl);

    dayMatches.forEach(m => {
      const t1 = getTeam(m.home);
      const t2 = getTeam(m.away);
      if (!t1 || !t2) return;
      const live = isLive(m.utc, m.id);
      const past = isPast(m.utc, m.id);
      const card = document.createElement('div');
      card.className = 'match-card' + (live ? ' live' : '') + (selectedMatchId === m.id ? ' selected' : '');
      card.onclick = () => selectMatch(m.id);

      const scoreStr = m.score ? `${m.score[0]}–${m.score[1]}` : '';
      const liveMin = live && m.liveMinute ? m.liveMinute : '';
      const timeStr = live
        ? `<span style="display:inline-flex;align-items:center;gap:5px;background:rgba(245,166,35,0.15);border:1px solid var(--gold);border-radius:20px;padding:2px 8px;font-size:10px;font-weight:700;color:var(--gold)"><span style="width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;flex-shrink:0"></span>LIVE${liveMin ? ' · ' + liveMin : ''}</span>`
        : m.isFinal && m.score
          ? `<span style="font-size:11px;color:var(--muted);font-weight:500">${m.finalTime || 'FT'}</span>`
          : formatAESTTime(m.utc);

      card.innerHTML = `
        <div class="match-meta">
          <span class="match-group">${u('group')} ${m.group} · ${u('mdPre')}${m.md}${u('mdPost')}</span>
          <span class="match-time">${timeStr}</span>
        </div>
        <div class="match-teams">
          <div class="team-display">
            <span class="flag">${t1.flag}</span>
            <span class="team-name">${t1.name}</span>
          </div>
          ${m.score ? `<span class="score-display">${m.score[0]}–${m.score[1]}</span>` : `<span class="vs">vs</span>`}
          <div class="team-display right">
            <span class="team-name">${t2.name}</span>
            <span class="flag">${t2.flag}</span>
          </div>
        </div>
        <div><span class="match-venue">📍 ${venue(m.venue)}</span></div>`;
      dg.appendChild(card);
    });

    list.appendChild(dg);
  });
}

const GROUP_TEAMS = {
  A:['MEX','RSA','KOR','CZE'], B:['CAN','BIH','QAT','SUI'],
  C:['BRA','MAR','HTI','SCO'], D:['USA','PRY','AUS','TUR'],
  E:['GER','CIV','ECU','CUW'], F:['NED','JPN','SWE','TUN'],
  G:['BEL','EGY','IRN','NZL'], H:['ESP','CPV','KSA','URU'],
  I:['FRA','SEN','IRQ','NOR'], J:['ARG','ALG','AUT','JOR'],
  K:['POR','COD','UZB','COL'], L:['ENG','CRO','GHA','PAN']
};

function renderGroupsView(container) {
  const panel = document.createElement('div');
  panel.className = 'groups-grid';
  Object.entries(GROUP_TEAMS).forEach(([grp, codes]) => {
    const gc = document.createElement('div');
    gc.className = 'group-card';
    gc.innerHTML = `<div class="group-title">Group ${grp}</div>`;
    codes.forEach(code => {
      const t = getTeam(code);
      if (!t) {
        gc.innerHTML += `<div class="group-team"><span class="flag">🏳️</span><span class="group-team-name">${code}</span></div>`;
        return;
      }
      gc.innerHTML += `<div class="group-team" onclick="viewTeam('${code}')">
        <span class="flag">${t.flag}</span>
        <span class="group-team-name">${t.name}</span>
        <span class="group-team-rank">${t.rank ? '#'+t.rank : ''}</span>
      </div>`;
    });
    panel.appendChild(gc);
  });
  container.appendChild(panel);
}

function selectMatch(id) {
  selectedMatchId = id;
  renderSchedulePanel();

  const m = MATCHES.find(x => x.id === id);
  const t1 = getTeam(m.home);
  const t2 = getTeam(m.away);
  if (!t1 || !t2) return;

  document.getElementById('detailEmpty').classList.add('hidden');
  const dc = document.getElementById('detailContent');
  dc.classList.remove('hidden');

  const live = isLive(m.utc);
  const past = isPast(m.utc);
  const predKey = `${m.home}-${m.away}`;
  const pred = PREDICTIONS[predKey] || [33, 33, 34];

  const statusHTML = live
    ? `<div class="hero-status"><span class="live-dot"></span> ${u('liveNow')}</div>`
    : past && m.score
    ? `<div class="hero-status" style="color:var(--muted);border-color:var(--muted)">${u('fullTime')}</div>`

  const heroLiveMin = m.isLive && m.liveMinute ? `<div style="font-size:12px;color:var(--accent);font-weight:700;margin-top:4px">🔴 ${m.liveMinute}</div>` : '';
  const scoreHTML = m.score
    ? `<div style="text-align:center"><span class="hero-score">${m.score[0]}–${m.score[1]}</span>${heroLiveMin}</div>`
    : `<span class="hero-vs">vs</span>`;

  dc.innerHTML = `
    <div class="match-hero">
      ${statusHTML}
      <div class="hero-group">${u('group')} ${m.group} · ${u('mdPre')}${m.md}${u('mdPost')}</div>
      <div class="hero-matchup">
        <div class="hero-team">
          <span class="hero-flag">${t1.flag}</span>
          <div class="hero-name">${t1.name}</div>
          <div class="hero-sub">${t1.formation || ''}</div>
        </div>
        ${scoreHTML}
        <div class="hero-team">
          <span class="hero-flag">${t2.flag}</span>
          <div class="hero-name">${t2.name}</div>
          <div class="hero-sub">${t2.formation || ''}</div>
        </div>
      </div>
      <div class="hero-info">
        <div class="hero-info-item">📍 <strong>${venue(m.venue)}</strong></div>
      </div>
    </div>

    <div class="section">
      <h3><span>📖</span> ${u('preview')}</h3>
      <p style="font-size:14px;line-height:1.7;color:var(--text)">${lang === 'zh' && PREVIEWS_ZH[m.id] ? PREVIEWS_ZH[m.id] : m.preview}</p>
    </div>

    <div class="section">

      <div class="prediction">

      </div>
      <div class="prediction">
        <span class="pred-label">${u('draw')}</span>
        <div class="pred-bar-wrap"><div class="pred-bar-draw" style="width:${pred[1]}%"></div></div>

    <div class="section">

      </div>
    </div>

    <div class="section">
      <h3><span>👁️</span> ${u('watchFor')}</h3>

      </div>
    </div>`;
  dc.scrollTop = 0;
  dc.parentElement.scrollTop = 0;
  document.getElementById('detailPanel').scrollTop = 0;
}

function viewTeam(code) {
  // Find first match for this team
  const m = MATCHES.find(x => x.home === code || x.away === code);
  if (m) {
    switchTab('schedule');
    setTimeout(() => selectMatch(m.id), 100);
  }
}

// ── Score persistence ───────────────────────────────────────────────────────
function saveScoresToStorage() {
  const data = {};
  MATCHES.forEach(m => {
    if (m.score || m.isFinal) {
      data[m.id] = { score: m.score, isFinal: m.isFinal, isLive: m.isLive, liveMinute: m.liveMinute, finalTime: m.finalTime };
    }
  });
  try { localStorage.setItem('wcg_scores', JSON.stringify(data)); } catch(e) {}
}

function loadScoresFromStorage() {
  try {
    const data = JSON.parse(localStorage.getItem('wcg_scores') || '{}');
    MATCHES.forEach(m => {
      if (data[m.id]) {
        Object.assign(m, data[m.id]);
      }
    });
  } catch(e) {}
}

let _pollTimer = null;

async function fetchLiveScores() {
  try {
    // Fetch from tournament start through tomorrow (covers all completed + upcoming games)
    const fmtDate = d => d.toISOString().slice(0,10).replace(/-/g,'');
    const today = new Date();
    const tournamentStart = new Date('2026-06-11'); // day before opening, catches UTC-edge games
    const days = [];
    for (let d = new Date(tournamentStart); d <= new Date(today.getTime() + 86400000); d = new Date(d.getTime() + 86400000)) {
      days.push(fmtDate(d));
    }
    // Cap at 10 days to avoid excessive requests during group stage
    const daysToFetch = days.slice(-10);
    const responses = await Promise.all(daysToFetch.map(date =>
      fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${date}`)
        .then(r => r.json()).catch(() => ({events:[]}))
    ));
    // Deduplicate events by id
    const seen = new Set();
    const events = responses.flatMap(d => d.events || []).filter(e => {
      if (seen.has(e.id)) return false;
      seen.add(e.id);
      return true;
    });
    console.log('[WCG] ESPN events:', events.length, events.map(e => {
      const comp = e.competitions?.[0];
      const teams = comp?.competitors?.map(c => `${c.homeAway}:${c.team?.displayName}(${c.score})`).join(' vs ');
      return `${teams} [${comp?.status?.type?.state}/${comp?.status?.displayClock}]`;
    }));

    let anyChange = false;
    for (const ev of events) {
      const comp = ev.competitions?.[0];
      if (!comp) continue;

      const homeTeamName = comp.competitors?.find(c => c.homeAway === 'home')?.team?.displayName || '';
      const awayTeamName = comp.competitors?.find(c => c.homeAway === 'away')?.team?.displayName || '';
      const homeCode = ESPN_TEAM_MAP[homeTeamName];
      const awayCode = ESPN_TEAM_MAP[awayTeamName];

      // Find matching MATCHES entry by team codes
      const match = MATCHES.find(m =>
        (m.home === homeCode && m.away === awayCode) ||
        (m.home === awayCode && m.away === homeCode)
      );
      if (!match) { console.log('[WCG] no match for', homeTeamName, '(' + homeCode + ') vs', awayTeamName, '(' + awayCode + ')'); continue; }

      const status = comp.status?.type;
      const isInProgress = status?.state === 'in';
      const isComplete = status?.state === 'post';

      const homeScore = parseInt(comp.competitors?.find(c => c.homeAway === 'home')?.score || '0');
      const awayScore = parseInt(comp.competitors?.find(c => c.homeAway === 'away')?.score || '0');
      const clock = comp.status?.displayClock || '';

      const prevIsLive = match.isLive;
      const prevScore = match.score ? match.score.join('-') : '';

      match.isLive = isInProgress;
      match.isFinal = isComplete;
      if (isInProgress || isComplete) {
        if (match.home === homeCode) {
          match.score = [homeScore, awayScore];
        } else {
          match.score = [awayScore, homeScore];
        }
      }
      match.liveMinute = isInProgress ? clock : '';
      if (isComplete) match.finalTime = clock;

      const newScore = match.score ? match.score.join('-') : '';
      if (prevIsLive !== match.isLive || prevScore !== newScore) anyChange = true;
    }

    if (anyChange) {
      saveScoresToStorage();
      renderSchedulePanel();
      if (selectedMatchId) selectMatch(selectedMatchId);
    }

    // Speed up polling when a match is live
    const hasLive = MATCHES.some(m => m.isLive);
    schedulePoll(hasLive ? 30000 : 60000);
  } catch (e) {
    // silently fail, try again in 60s
    schedulePoll(60000);
  }
}

function schedulePoll(ms) {
  if (_pollTimer) clearTimeout(_pollTimer);
  _pollTimer = setTimeout(fetchLiveScores, ms);
}

// Kick off immediately, then poll
fetchLiveScores();

loadScoresFromStorage(); // restore previously fetched scores before first render
setLocation('Australia/Sydney'); // init — must run after all let declarations
renderSchedulePanel();
</script>
